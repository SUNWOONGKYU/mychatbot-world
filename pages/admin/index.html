<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 대시보드 - MCW Admin</title>
<link rel="stylesheet" href="../../css/styles.css?v=16.0">
<style>
:root { --sidebar-w: 240px; --bg: #0d0d12; --card: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.06); --text: #e2e8f0; --muted: rgba(255,255,255,0.4); --primary: #818cf8; --success: #34d399; --danger: #f87171; --warning: #fbbf24; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system,'Malgun Gothic',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; }

/* Sidebar */
.sidebar { width:var(--sidebar-w); background:#16161c; border-right:1px solid var(--border); padding:1.5rem 1rem; position:fixed; height:100vh; display:flex; flex-direction:column; }
.sidebar-brand { font-size:1.1rem; font-weight:800; color:var(--primary); margin-bottom:2rem; padding:0 0.5rem; }
.sidebar-nav { list-style:none; flex:1; }
.sidebar-nav li { margin-bottom:0.25rem; }
.sidebar-nav a { display:flex; align-items:center; gap:0.6rem; padding:0.7rem 0.75rem; border-radius:8px; color:var(--muted); text-decoration:none; font-size:0.9rem; transition:all 0.15s; cursor:pointer; }
.sidebar-nav a:hover, .sidebar-nav a.active { background:rgba(129,140,248,0.1); color:var(--primary); }
.sidebar-back { margin-top:auto; padding-top:1rem; border-top:1px solid var(--border); }
.sidebar-back a { color:var(--muted); text-decoration:none; font-size:0.85rem; }

/* Main */
.main { margin-left:var(--sidebar-w); flex:1; padding:2rem 2.5rem; }
.page-title { font-size:1.5rem; font-weight:700; margin-bottom:1.5rem; }
.section { display:none; }
.section.active { display:block; }

/* Stats cards */
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:1rem; margin-bottom:2rem; }
.stat-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:1.5rem; }
.stat-label { font-size:0.8rem; color:var(--muted); margin-bottom:0.5rem; }
.stat-value { font-size:1.8rem; font-weight:800; }
.stat-sub { font-size:0.75rem; color:var(--muted); margin-top:0.3rem; }

/* Table */
.admin-table-wrap { background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
.admin-table { width:100%; border-collapse:collapse; }
.admin-table th { background:rgba(255,255,255,0.02); text-align:left; padding:0.8rem 1rem; font-size:0.78rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; border-bottom:1px solid var(--border); }
.admin-table td { padding:0.75rem 1rem; font-size:0.88rem; border-bottom:1px solid var(--border); }
.admin-table tr:last-child td { border-bottom:none; }
.admin-table tr:hover { background:rgba(255,255,255,0.02); }

/* Buttons */
.btn-sm { padding:0.35rem 0.75rem; border:none; border-radius:6px; font-size:0.78rem; cursor:pointer; font-weight:600; }
.btn-approve { background:var(--success); color:#000; }
.btn-reject { background:var(--danger); color:#fff; }
.btn-primary { background:var(--primary); color:#fff; }
.btn-outline { background:transparent; border:1px solid var(--border); color:var(--text); }

/* Toolbar */
.toolbar { display:flex; gap:0.75rem; margin-bottom:1rem; align-items:center; flex-wrap:wrap; }
.toolbar input, .toolbar select { background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:8px; padding:0.5rem 0.75rem; color:var(--text); font-size:0.85rem; outline:none; }
.toolbar input:focus { border-color:var(--primary); }
.toolbar input { min-width:240px; }

/* Tabs */
.tab-bar { display:flex; gap:0.5rem; margin-bottom:1rem; }
.tab-btn { padding:0.5rem 1rem; border:1px solid var(--border); border-radius:8px; background:transparent; color:var(--muted); cursor:pointer; font-size:0.85rem; }
.tab-btn.active { background:rgba(129,140,248,0.15); color:var(--primary); border-color:var(--primary); }

/* Pagination */
.pagination { display:flex; justify-content:center; gap:0.3rem; margin-top:1rem; }
.pagination button { padding:0.4rem 0.7rem; border:1px solid var(--border); border-radius:6px; background:transparent; color:var(--text); cursor:pointer; font-size:0.8rem; }
.pagination button.active { background:var(--primary); color:#fff; border-color:var(--primary); }

/* Toast */
.toast { position:fixed; bottom:2rem; right:2rem; background:#1e1e2e; border:1px solid var(--border); padding:0.8rem 1.2rem; border-radius:10px; color:var(--text); font-size:0.88rem; opacity:0; transition:opacity 0.3s; z-index:9999; }
.toast.show { opacity:1; }

/* Loading */
.loading { text-align:center; padding:3rem; color:var(--muted); }

/* Badge */
.badge { display:inline-block; padding:0.2rem 0.6rem; border-radius:20px; font-size:0.72rem; font-weight:600; }
.badge-pending { background:rgba(251,191,36,0.15); color:var(--warning); }
.badge-completed { background:rgba(52,211,153,0.15); color:var(--success); }
.badge-failed { background:rgba(248,113,113,0.15); color:var(--danger); }
</style>
</head>
<body>

<!-- Sidebar -->
<nav class="sidebar">
  <div class="sidebar-brand">MCW Admin</div>
  <ul class="sidebar-nav">
    <li><a onclick="showSection('dashboard')" class="active" id="nav-dashboard">📊 대시보드</a></li>
    <li><a onclick="showSection('users')" id="nav-users">👥 사용자 관리</a></li>
    <li><a onclick="showSection('payments')" id="nav-payments">💳 결제 관리</a></li>
    <li><a onclick="showSection('skills')" id="nav-skills">🔧 스킬 관리</a></li>
    <li><a onclick="showSection('bots')" id="nav-bots">🤖 봇 관리</a></li>
  </ul>
  <div class="sidebar-back"><a href="../home/index.html">← 마이페이지로</a></div>
</nav>

<!-- Main Content -->
<div class="main">

  <!-- Dashboard -->
  <div class="section active" id="sec-dashboard">
    <h1 class="page-title">대시보드</h1>
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="stat-label">총 사용자</div><div class="stat-value" id="statUsers">-</div></div>
      <div class="stat-card"><div class="stat-label">총 봇</div><div class="stat-value" id="statBots">-</div></div>
      <div class="stat-card"><div class="stat-label">총 매출</div><div class="stat-value" id="statRevenue">-</div><div class="stat-sub">원</div></div>
      <div class="stat-card"><div class="stat-label">대기 입금</div><div class="stat-value" id="statPending">-</div><div class="stat-sub">건</div></div>
    </div>
    <h2 style="font-size:1.1rem;margin-bottom:1rem;">최근 입금 신청</h2>
    <div class="admin-table-wrap"><table class="admin-table"><thead><tr><th>입금자명</th><th>금액</th><th>신청일</th><th>상태</th><th>처리</th></tr></thead><tbody id="recentPayments"><tr><td colspan="5" class="loading">로딩 중...</td></tr></tbody></table></div>
  </div>

  <!-- Users -->
  <div class="section" id="sec-users">
    <h1 class="page-title">사용자 관리</h1>
    <div class="toolbar">
      <input type="text" id="userSearch" placeholder="이메일 또는 이름 검색..." onkeyup="if(event.key==='Enter')loadUsers()">
      <button class="btn-sm btn-primary" onclick="loadUsers()">검색</button>
    </div>
    <div class="admin-table-wrap"><table class="admin-table"><thead><tr><th>이메일</th><th>이름</th><th>가입일</th><th>크레딧</th></tr></thead><tbody id="usersBody"><tr><td colspan="4" class="loading">로딩 중...</td></tr></tbody></table></div>
    <div class="pagination" id="usersPagination"></div>
  </div>

  <!-- Payments -->
  <div class="section" id="sec-payments">
    <h1 class="page-title">결제 관리</h1>
    <div class="tab-bar">
      <button class="tab-btn active" onclick="loadPayments('pending',this)">대기 중</button>
      <button class="tab-btn" onclick="loadPayments('completed',this)">완료</button>
      <button class="tab-btn" onclick="loadPayments('all',this)">전체</button>
    </div>
    <div class="admin-table-wrap"><table class="admin-table"><thead><tr><th>ID</th><th>입금자명</th><th>금액</th><th>신청일</th><th>상태</th><th>처리</th></tr></thead><tbody id="paymentsBody"><tr><td colspan="6" class="loading">로딩 중...</td></tr></tbody></table></div>
    <div class="pagination" id="paymentsPagination"></div>
  </div>

  <!-- Skills -->
  <div class="section" id="sec-skills">
    <h1 class="page-title">스킬 관리</h1>
    <div class="admin-table-wrap"><table class="admin-table"><thead><tr><th>ID</th><th>이름</th><th>가격</th><th>설치 수</th><th>상태</th></tr></thead><tbody id="skillsBody"><tr><td colspan="5" class="loading">로딩 중...</td></tr></tbody></table></div>
  </div>

  <!-- Bots -->
  <div class="section" id="sec-bots">
    <h1 class="page-title">봇 관리</h1>
    <div class="toolbar">
      <input type="text" id="botSearch" placeholder="봇 이름 검색..." onkeyup="if(event.key==='Enter')loadBots()">
      <button class="btn-sm btn-primary" onclick="loadBots()">검색</button>
    </div>
    <div class="admin-table-wrap"><table class="admin-table"><thead><tr><th>ID</th><th>봇 이름</th><th>소유자</th><th>카테고리</th><th>생성일</th></tr></thead><tbody id="botsBody"><tr><td colspan="5" class="loading">로딩 중...</td></tr></tbody></table></div>
    <div class="pagination" id="botsPagination"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="../../js/app.js"></script>
<script>
'use strict';

let _token = '';
const ADMIN_EMAILS = ['wksn@gmail.com'];

// ── Auth ──
async function checkAdmin() {
  const { data: { session } } = await MCW.supabase.auth.getSession();
  if (!session) { window.location.href = '../login.html'; return null; }
  if (!ADMIN_EMAILS.includes(session.user.email)) {
    alert('관리자 권한이 없습니다.');
    window.location.href = '../home/index.html';
    return null;
  }
  _token = session.access_token;
  return session;
}

function api(path, opts = {}) {
  return fetch(path, {
    ...opts,
    headers: { 'Authorization': `Bearer ${_token}`, 'Content-Type': 'application/json', ...(opts.headers || {}) }
  }).then(r => r.json());
}

// ── Navigation ──
function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
  document.getElementById('sec-' + id)?.classList.add('active');
  document.getElementById('nav-' + id)?.classList.add('active');
  if (id === 'dashboard') loadDashboard();
  if (id === 'users') loadUsers();
  if (id === 'payments') loadPayments('pending');
  if (id === 'skills') loadSkills();
  if (id === 'bots') loadBots();
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function fmtDate(d) { if(!d)return '-'; return new Date(d).toLocaleDateString('ko-KR'); }
function fmtMoney(n) { return (n||0).toLocaleString(); }
function statusBadge(s) {
  const cls = s==='pending'?'badge-pending':s==='completed'?'badge-completed':'badge-failed';
  return `<span class="badge ${cls}">${s}</span>`;
}

// ── Dashboard ──
async function loadDashboard() {
  try {
    const d = await api('/api/admin/stats');
    document.getElementById('statUsers').textContent = fmtMoney(d.totalUsers);
    document.getElementById('statBots').textContent = fmtMoney(d.totalBots);
    document.getElementById('statRevenue').textContent = fmtMoney(d.totalRevenue);
    document.getElementById('statPending').textContent = fmtMoney(d.pendingPayments);
  } catch(e) { console.error(e); }

  try {
    const p = await api('/api/admin/payments?status=pending&limit=5');
    const rows = (p.payments||[]).map(r => `<tr>
      <td>${r.metadata?.depositor_name||'-'}</td>
      <td>${fmtMoney(r.amount)}원</td>
      <td>${fmtDate(r.created_at)}</td>
      <td>${statusBadge(r.status)}</td>
      <td><button class="btn-sm btn-approve" onclick="approvePayment('${r.id}')">승인</button> <button class="btn-sm btn-reject" onclick="rejectPayment('${r.id}')">거부</button></td>
    </tr>`).join('') || '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:2rem;">대기 중인 입금이 없습니다.</td></tr>';
    document.getElementById('recentPayments').innerHTML = rows;
  } catch(e) { document.getElementById('recentPayments').innerHTML = '<tr><td colspan="5" class="loading">로드 실패</td></tr>'; }
}

// ── Users ──
let usersPage = 1;
async function loadUsers(page) {
  if (page) usersPage = page;
  const search = document.getElementById('userSearch')?.value || '';
  try {
    const d = await api(`/api/admin/users?search=${encodeURIComponent(search)}&page=${usersPage}&limit=20`);
    const rows = (d.users||[]).map(u => `<tr>
      <td>${u.email||'-'}</td>
      <td>${u.raw_user_meta_data?.name||u.raw_user_meta_data?.full_name||'-'}</td>
      <td>${fmtDate(u.created_at)}</td>
      <td>${fmtMoney(u.credit_balance||0)}</td>
    </tr>`).join('') || '<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:2rem;">사용자 없음</td></tr>';
    document.getElementById('usersBody').innerHTML = rows;
    renderPagination('usersPagination', usersPage, d.totalPages||1, p => loadUsers(p));
  } catch(e) { document.getElementById('usersBody').innerHTML = '<tr><td colspan="4" class="loading">로드 실패</td></tr>'; }
}

// ── Payments ──
let paymentsPage = 1;
let paymentsStatus = 'pending';
async function loadPayments(status, btn) {
  if (status) paymentsStatus = status;
  paymentsPage = 1;
  if (btn) { document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }
  await fetchPayments();
}
async function fetchPayments(page) {
  if (page) paymentsPage = page;
  const qs = paymentsStatus === 'all' ? '' : `&status=${paymentsStatus}`;
  try {
    const d = await api(`/api/admin/payments?page=${paymentsPage}&limit=20${qs}`);
    const rows = (d.payments||[]).map(r => {
      const actions = r.status==='pending'
        ? `<button class="btn-sm btn-approve" onclick="approvePayment('${r.id}')">승인</button> <button class="btn-sm btn-reject" onclick="rejectPayment('${r.id}')">거부</button>`
        : '-';
      return `<tr>
        <td style="font-size:0.75rem;color:var(--muted);">${(r.id||'').slice(0,8)}</td>
        <td>${r.metadata?.depositor_name||'-'}</td>
        <td>${fmtMoney(r.amount)}원</td>
        <td>${fmtDate(r.created_at)}</td>
        <td>${statusBadge(r.status)}</td>
        <td>${actions}</td>
      </tr>`;
    }).join('') || '<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:2rem;">데이터 없음</td></tr>';
    document.getElementById('paymentsBody').innerHTML = rows;
    renderPagination('paymentsPagination', paymentsPage, d.totalPages||1, p => fetchPayments(p));
  } catch(e) { document.getElementById('paymentsBody').innerHTML = '<tr><td colspan="6" class="loading">로드 실패</td></tr>'; }
}

async function approvePayment(id) {
  if (!confirm('이 입금을 승인하시겠습니까?')) return;
  try {
    await api('/api/admin/payments', { method:'PATCH', body:JSON.stringify({ paymentId:id, action:'approve' }) });
    toast('입금 승인 완료');
    loadDashboard(); fetchPayments();
  } catch(e) { toast('승인 실패: ' + (e.message||'')); }
}
async function rejectPayment(id) {
  if (!confirm('이 입금을 거부하시겠습니까?')) return;
  try {
    await api('/api/admin/payments', { method:'PATCH', body:JSON.stringify({ paymentId:id, action:'reject' }) });
    toast('입금 거부 처리됨');
    fetchPayments();
  } catch(e) { toast('거부 실패'); }
}

// ── Skills ──
async function loadSkills() {
  try {
    const d = await api('/api/admin/skills');
    const rows = (d.skills||[]).map(s => `<tr>
      <td style="font-size:0.8rem;">${s.id||s.skill_id||'-'}</td>
      <td>${s.name||s.skill_name||'-'}</td>
      <td>${s.price ? fmtMoney(s.price)+'원' : '무료'}</td>
      <td>${s.install_count||0}</td>
      <td>${s.is_active!==false ? '활성' : '비활성'}</td>
    </tr>`).join('') || '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:2rem;">스킬 없음</td></tr>';
    document.getElementById('skillsBody').innerHTML = rows;
  } catch(e) { document.getElementById('skillsBody').innerHTML = '<tr><td colspan="5" class="loading">로드 실패</td></tr>'; }
}

// ── Bots ──
let botsPage = 1;
async function loadBots(page) {
  if (page) botsPage = page;
  const search = document.getElementById('botSearch')?.value || '';
  try {
    const d = await api(`/api/admin/bots?search=${encodeURIComponent(search)}&page=${botsPage}&limit=20`);
    const rows = (d.bots||[]).map(b => `<tr>
      <td style="font-size:0.8rem;color:var(--muted);">${(b.id||'').slice(0,12)}</td>
      <td>${b.emoji||'🤖'} ${b.bot_name||'-'}</td>
      <td>${b.owner_id||'-'}</td>
      <td>${b.category||'-'}</td>
      <td>${fmtDate(b.created_at)}</td>
    </tr>`).join('') || '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:2rem;">봇 없음</td></tr>';
    document.getElementById('botsBody').innerHTML = rows;
    renderPagination('botsPagination', botsPage, d.totalPages||1, p => loadBots(p));
  } catch(e) { document.getElementById('botsBody').innerHTML = '<tr><td colspan="5" class="loading">로드 실패</td></tr>'; }
}

// ── Pagination ──
function renderPagination(containerId, current, total, cb) {
  const el = document.getElementById(containerId);
  if (!el || total <= 1) { if(el) el.innerHTML=''; return; }
  let html = '';
  if (current > 1) html += `<button onclick="(${cb.toString()})(${current-1})">‹</button>`;
  for (let i = 1; i <= total; i++) {
    html += `<button class="${i===current?'active':''}" onclick="(${cb.toString()})(${i})">${i}</button>`;
  }
  if (current < total) html += `<button onclick="(${cb.toString()})(${current+1})">›</button>`;
  el.innerHTML = html;
}

// ── Init ──
(async function init() {
  const session = await checkAdmin();
  if (!session) return;
  loadDashboard();
})();
</script>
</body>
</html>
