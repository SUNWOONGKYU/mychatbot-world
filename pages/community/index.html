      <div class="search-box">
        <button id="searchBtn" aria-label="검색">🔍</button>
        <input
          type="search"
          id="searchInput"
          placeholder="검색어 입력..."
          aria-label="게시글 검색"
          maxlength="60"
        >
      </div>
    </div>

    <!-- 게시글 목록 -->

      <!-- 헤더 행 (데스크탑) -->

        <span>댓글</span>
        <span>조회</span>
