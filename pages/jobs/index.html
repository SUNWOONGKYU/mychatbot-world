<!--
@task S3F9
@description 구봇구직 메인 페이지 — 챗봇 목록/탐색, 카테고리 필터, 탭 전환, 정렬, 페이지네이션
-->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>구봇구직 — My Chatbot World</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/jobs.css">
</head>
<body>

  <!-- ===== 헤더 ===== -->
  <header class="jobs-header">
    <div class="jobs-header-inner">
      <a href="../../index.html" class="jobs-logo">
        <span class="jobs-logo-icon">🤖</span>
        <span class="jobs-logo-text">구봇구직</span>
      </a>

      <!-- 검색바 -->
      <form class="jobs-search-form" id="mainSearchForm" role="search">
        <div class="jobs-search-wrap">
          <svg class="jobs-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input
            type="search"
            id="mainSearchInput"
            class="jobs-search-input"
            placeholder="챗봇 이름, 기능, 카테고리 검색..."
            autocomplete="off"
            aria-label="챗봇 검색"
          >
          <button type="submit" class="jobs-search-btn">검색</button>
        </div>
      </form>

      <nav class="jobs-header-nav">
        <a href="../../index.html" class="jobs-nav-link">홈</a>
        <a href="#" class="jobs-nav-link jobs-nav-link--active">구봇구직</a>
        <!-- TODO: replace with actual route once bot dashboard page exists -->
        <a href="javascript:void(0)" class="jobs-nav-link">내 챗봇</a>
      </nav>
    </div>
  </header>

  <!-- ===== 카테고리 필터 바 ===== -->
  <section class="jobs-category-bar" aria-label="카테고리 필터">
    <div class="jobs-category-inner">
      <button class="jobs-cat-btn jobs-cat-btn--active" data-category="all">전체</button>
      <button class="jobs-cat-btn" data-category="customer-service">고객서비스</button>
      <button class="jobs-cat-btn" data-category="education">교육</button>
      <button class="jobs-cat-btn" data-category="marketing">마케팅</button>
      <button class="jobs-cat-btn" data-category="development">개발</button>
      <button class="jobs-cat-btn" data-category="etc">기타</button>
    </div>
  </section>

  <!-- ===== 메인 컨텐츠 ===== -->
  <main class="jobs-main">
    <div class="jobs-container">

      <!-- 탭 네비게이션 -->
      <div class="jobs-tabs" role="tablist" aria-label="구봇구직 탭">
        <button
          class="jobs-tab jobs-tab--active"
          role="tab"
          aria-selected="true"
          aria-controls="panel-bot"
          id="tab-bot"
          data-tab="bot"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="jobs-tab-icon">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          구봇 찾기
          <span class="jobs-tab-badge" id="botCount">0</span>
        </button>
        <button
          class="jobs-tab"
          role="tab"
          aria-selected="false"
          aria-controls="panel-job"
          id="tab-job"
          data-tab="job"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="jobs-tab-icon">
            <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
          </svg>
          일감 찾기
          <span class="jobs-tab-badge" id="jobCount">0</span>
        </button>
      </div>

      <!-- ===== 구봇 찾기 패널 ===== -->
      <div id="panel-bot" role="tabpanel" aria-labelledby="tab-bot" class="jobs-panel jobs-panel--active">

        <!-- 툴바: 결과 수 + 정렬 -->
        <div class="jobs-toolbar">
          <p class="jobs-result-count">
            <span id="botResultCount">0</span>개의 챗봇을 찾았습니다
          </p>
          <div class="jobs-sort-wrap">
            <label for="botSort" class="jobs-sort-label">정렬:</label>
            <select id="botSort" class="jobs-sort-select" aria-label="정렬 기준">
              <option value="popular">인기순</option>
              <option value="latest">최신순</option>
              <option value="rating">평점순</option>
              <option value="price-low">가격 낮은순</option>
              <option value="price-high">가격 높은순</option>
            </select>
          </div>
        </div>

        <!-- 챗봇 카드 그리드 -->
        <div class="jobs-card-grid" id="botGrid" aria-live="polite" aria-label="챗봇 목록">
          <!-- JS로 동적 렌더링 -->
          <div class="jobs-skeleton-grid" id="botSkeleton" aria-hidden="true">
            <div class="jobs-card-skeleton"></div>
            <div class="jobs-card-skeleton"></div>
            <div class="jobs-card-skeleton"></div>
            <div class="jobs-card-skeleton"></div>
            <div class="jobs-card-skeleton"></div>
            <div class="jobs-card-skeleton"></div>
          </div>
        </div>

        <!-- 빈 상태 -->
        <div class="jobs-empty" id="botEmpty" hidden>
          <div class="jobs-empty-icon">🤖</div>
          <h3 class="jobs-empty-title">챗봇을 찾을 수 없습니다</h3>
          <p class="jobs-empty-desc">다른 카테고리나 검색어를 시도해보세요.</p>
          <button class="jobs-empty-btn" id="botResetBtn">전체 보기</button>
        </div>

        <!-- 페이지네이션 -->
        <nav class="jobs-pagination" id="botPagination" aria-label="페이지 탐색" hidden>
          <button class="jobs-page-btn" id="botPrevBtn" aria-label="이전 페이지" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
          </button>
          <div class="jobs-page-numbers" id="botPageNumbers" role="list"></div>
          <button class="jobs-page-btn" id="botNextBtn" aria-label="다음 페이지">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
          </button>
        </nav>

      </div><!-- /panel-bot -->

      <!-- ===== 일감 찾기 패널 ===== -->
      <div id="panel-job" role="tabpanel" aria-labelledby="tab-job" class="jobs-panel" hidden>

        <!-- 툴바 -->
        <div class="jobs-toolbar">
          <p class="jobs-result-count">
            <span id="jobResultCount">0</span>개의 일감을 찾았습니다
          </p>
          <div class="jobs-sort-wrap">
            <label for="jobSort" class="jobs-sort-label">정렬:</label>
            <select id="jobSort" class="jobs-sort-select" aria-label="정렬 기준">
              <option value="latest">최신순</option>
              <option value="budget-high">예산 높은순</option>
              <option value="budget-low">예산 낮은순</option>
              <option value="deadline">마감임박순</option>
            </select>
          </div>
        </div>

        <!-- 일감 카드 그리드 -->
        <div class="jobs-card-grid" id="jobGrid" aria-live="polite" aria-label="일감 목록">
          <div class="jobs-skeleton-grid" id="jobSkeleton" aria-hidden="true">
            <div class="jobs-card-skeleton"></div>
            <div class="jobs-card-skeleton"></div>
            <div class="jobs-card-skeleton"></div>
          </div>
        </div>

        <!-- 빈 상태 -->
        <div class="jobs-empty" id="jobEmpty" hidden>
          <div class="jobs-empty-icon">💼</div>
          <h3 class="jobs-empty-title">일감을 찾을 수 없습니다</h3>
          <p class="jobs-empty-desc">다른 카테고리나 검색어를 시도해보세요.</p>
          <button class="jobs-empty-btn" id="jobResetBtn">전체 보기</button>
        </div>

        <!-- 페이지네이션 -->
        <nav class="jobs-pagination" id="jobPagination" aria-label="페이지 탐색" hidden>
          <button class="jobs-page-btn" id="jobPrevBtn" aria-label="이전 페이지" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
          </button>
          <div class="jobs-page-numbers" id="jobPageNumbers" role="list"></div>
          <button class="jobs-page-btn" id="jobNextBtn" aria-label="다음 페이지">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
          </button>
        </nav>

      </div><!-- /panel-job -->

    </div><!-- /jobs-container -->
  </main>

  <!-- ===== 에러 토스트 ===== -->
  <div class="jobs-toast" id="jobsToast" role="alert" aria-live="assertive" hidden>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <span id="toastMessage"></span>
  </div>

  <script src="../../js/utils.js"></script>
  <script src="../../js/jobs.js"></script>
  <script>
    // @task S3F9 — 메인 페이지 초기화
    document.addEventListener('DOMContentLoaded', () => {
      JobsApp.init({ page: 'index' });
    });
  </script>
</body>
</html>
