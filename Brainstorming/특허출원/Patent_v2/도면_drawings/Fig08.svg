<?xml version="1.0" encoding="UTF-8"?>
<!-- 5단계 라이프사이클 구조도 (도 8) -->
<svg width="1000" height="900" viewBox="0 0 1000 900" xmlns="http://www.w3.org/2000/svg">
    <rect width="100%" height="100%" fill="white"/>

    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="userSpaceOnUse">
            <path d="M0,0 L10,5 L0,10 L2.5,5 Z" fill="black"/>
        </marker>
    </defs>

    <!-- TITLE -->
    <text x="500" y="50" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="36" font-weight="bold">도 8: 5단계 라이프사이클 구조도</text>

    <!-- 1단계: 생성 (20) — 상단 중앙 -->
    <rect x="350" y="100" width="300" height="90" fill="white" stroke="black" stroke-width="2" rx="5"/>
    <text x="500" y="135" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="16">1단계</text>
    <text x="500" y="175" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="22" font-weight="bold">생성 (20)</text>

    <!-- 화살표: 1→2 (우측 끝점을 2단계 박스 좌측 상단에 맞춤) -->
    <line x1="650" y1="145" x2="700" y2="255" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- 2단계: 학습 (40) — 우상 -->
    <rect x="700" y="260" width="260" height="90" fill="white" stroke="black" stroke-width="2" rx="5"/>
    <text x="830" y="295" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="16">2단계</text>
    <text x="830" y="335" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="22" font-weight="bold">학습부 (40)</text>

    <!-- 화살표: 2→3 -->
    <line x1="830" y1="350" x2="830" y2="445" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- 3단계: 성장부 (45) — 우하 -->
    <rect x="700" y="450" width="260" height="110" fill="white" stroke="black" stroke-width="2" rx="5"/>
    <text x="830" y="480" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="16">3단계</text>
    <text x="830" y="515" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="22" font-weight="bold">성장부 (45)</text>
    <text x="830" y="545" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="15" fill="black">(커뮤니티·스킬 마켓)</text>

    <!-- 화살표: 3→4 -->
    <line x1="700" y1="555" x2="650" y2="615" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- 4단계: 수익활동 (70) — 하단 중앙, x=350으로 이동(중심 x=500) -->
    <rect x="350" y="615" width="300" height="90" fill="white" stroke="black" stroke-width="2" rx="5"/>
    <text x="500" y="650" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="16">4단계</text>
    <text x="500" y="690" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="20" font-weight="bold">수익활동 (70)</text>

    <!-- 화살표: 4→5 -->
    <line x1="350" y1="660" x2="300" y2="520" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- 5단계: 피상속 (50) — 좌측 -->
    <rect x="40" y="450" width="260" height="130" fill="white" stroke="black" stroke-width="2" rx="5"/>
    <text x="170" y="485" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="16">5단계</text>
    <text x="170" y="525" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="22" font-weight="bold">피상속 (50)</text>

    <!-- 중앙 라벨 -->
    <text x="460" y="430" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="20" font-weight="bold">AI 챗봇</text>
    <text x="460" y="458" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="20" font-weight="bold">라이프사이클</text>

    <!-- 하단 범례 -->
    <rect x="150" y="760" width="700" height="100" fill="none" stroke="black" stroke-width="1" stroke-dasharray="6,3" rx="5"/>
    <text x="500" y="793" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="17">생성(20) → 학습(40) → 성장(45) → 수익활동(70) → 피상속(50)</text>
    <text x="500" y="820" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="15" fill="black">학습부(40): DB축적·멘토링·스쿨 / 성장부(45): 커뮤니티·스킬 마켓</text>
</svg>
