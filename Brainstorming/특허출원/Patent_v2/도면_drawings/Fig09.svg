<?xml version="1.0" encoding="UTF-8"?>
<!-- 수익활동 중개부 구성도 (도 9) -->
<svg width="1000" height="900" viewBox="0 0 1000 900" xmlns="http://www.w3.org/2000/svg">
    <rect width="100%" height="100%" fill="white"/>

    <defs>
        <marker id="arrow" markerWidth="6" markerHeight="6" refX="6" refY="3" orient="auto">
            <path d="M0,0 L6,3 L0,6 L1.5,3 Z" fill="black"/>
        </marker>
    </defs>

    <!-- TITLE -->
    <text x="500" y="50" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="40" font-weight="bold">도 9: 수익활동 중개부 구성도</text>

    <!-- 외곽 박스: 수익활동 중개부 (90) -->
    <rect x="40" y="80" width="920" height="790" fill="none" stroke="black" stroke-width="3" rx="5"/>
    <text x="500" y="115" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="28" font-weight="bold">수익활동 중개부 (90)</text>

    <!-- 박스 1: 중개 요청 수신부 (91) - 상단 중앙 -->
    <rect x="300" y="140" width="400" height="110" fill="white" stroke="black" stroke-width="2" rx="5"/>
    <text x="500" y="185" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="24" font-weight="bold">중개 요청 수신부 (91)</text>
    <text x="500" y="215" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="18">텍스트 / 음성 / 이미지 수신</text>

    <!-- 화살표: 91 → 92 (하단 중앙으로) -->
    <line x1="500" y1="250" x2="280" y2="340" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- 화살표: 92 → 93 (좌측에서 우측으로 순차) -->
    <line x1="480" y1="410" x2="520" y2="410" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- 박스 2: 중개 유형 분류부 (92) - 중단 좌측 -->
    <rect x="80" y="340" width="400" height="140" fill="white" stroke="black" stroke-width="2" rx="5"/>
    <text x="280" y="385" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="24" font-weight="bold">중개 유형 분류부 (92)</text>
    <text x="280" y="415" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="18">상담형 / 예약형 / 추천형 / 교육형</text>
    <text x="280" y="445" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="18">자동 분류</text>

    <!-- 박스 3: 중개 처리부 (93) - 중단 우측 -->
    <rect x="520" y="340" width="400" height="140" fill="white" stroke="black" stroke-width="2" rx="5"/>
    <text x="720" y="385" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="24" font-weight="bold">중개 처리부 (93)</text>
    <text x="720" y="415" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="18">유형별 중개 서비스 실행</text>
    <text x="720" y="445" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="18">(상담연결 / 예약처리 / 추천 / 강의)</text>

    <!-- 화살표: 93 → 94 (92→93→94 순차 흐름) -->
    <line x1="720" y1="480" x2="500" y2="580" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- 박스 4: 수수료 계산부 (94) - 하단 좌측 -->
    <rect x="80" y="580" width="400" height="140" fill="white" stroke="black" stroke-width="2" rx="5"/>
    <text x="280" y="625" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="24" font-weight="bold">수수료 계산부 (94)</text>
    <text x="280" y="655" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="18">플랫폼 수수료: 중개 수익의 20%</text>
    <text x="280" y="685" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="18">자동 계산</text>

    <!-- 박스 5: 정산 처리부 (95) - 하단 우측 -->
    <rect x="520" y="580" width="400" height="140" fill="white" stroke="black" stroke-width="2" rx="5"/>
    <text x="720" y="625" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="24" font-weight="bold">정산 처리부 (95)</text>
    <text x="720" y="655" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="18">챗봇 운영자 80% 정산</text>
    <text x="720" y="685" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="18">일별 / 주별 / 월별 또는 즉시</text>

    <!-- 화살표: 94 → 95 (수평) -->
    <line x1="480" y1="650" x2="520" y2="650" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- 수익 흐름 설명 박스 (점선) -->
    <rect x="80" y="770" width="840" height="70" fill="none" stroke="black" stroke-width="1" stroke-dasharray="6,3" rx="5"/>
    <text x="500" y="812" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="18">수익 흐름: 챗봇 중개 수익 → 플랫폼 20% 자동 수취 + 챗봇 운영자 80% 자동 정산</text>

</svg>
