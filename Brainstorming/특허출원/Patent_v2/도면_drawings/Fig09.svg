<?xml version="1.0" encoding="UTF-8"?>
<!-- 배포부 구성도 (도 9) -->
<svg width="1000" height="600" viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
    <rect width="100%" height="100%" fill="white"/>

    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="userSpaceOnUse">
            <path d="M0,0 L10,5 L0,10 L2.5,5 Z" fill="black"/>
        </marker>
    </defs>

    <!-- TITLE -->
    <text x="500" y="45" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="36" font-weight="bold">도 9: 배포부 구성도</text>

    <!-- 외곽: 배포부 (60) -->
    <rect x="40" y="70" width="920" height="500" fill="none" stroke="black" stroke-width="3" rx="5"/>
    <text x="500" y="110" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="26" font-weight="bold">배포부 (60)</text>

    <!-- 입력: 생성된 챗봇 -->
    <rect x="380" y="130" width="240" height="55" fill="white" stroke="black" stroke-width="2" rx="27"/>
    <text x="500" y="164" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="20" font-weight="bold">생성된 챗봇</text>

    <!-- 분기선 -->
    <line x1="500" y1="185" x2="500" y2="220" stroke="black" stroke-width="2"/>
    <line x1="250" y1="220" x2="750" y2="220" stroke="black" stroke-width="2"/>
    <line x1="250" y1="220" x2="250" y2="250" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="750" y1="220" x2="750" y2="250" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- URL 임베딩 모듈 (61) -->
    <rect x="80" y="255" width="340" height="90" fill="white" stroke="black" stroke-width="2" rx="5"/>
    <text x="250" y="290" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="22" font-weight="bold">URL 임베딩 모듈 (61)</text>
    <text x="250" y="320" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="15">챗봇 고유 URL 생성 및 채널 삽입</text>

    <!-- QR코드 생성 모듈 (62) -->
    <rect x="580" y="255" width="340" height="90" fill="white" stroke="black" stroke-width="2" rx="5"/>
    <text x="750" y="290" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="22" font-weight="bold">QR코드 생성 모듈 (62)</text>
    <text x="750" y="320" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="15">챗봇 URL 대응 QR코드 자동 생성</text>

    <!-- URL 공유 관계: 61 → 62 점선 화살표 -->
    <line x1="420" y1="300" x2="580" y2="300" stroke="black" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
    <text x="500" y="285" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="15" fill="black">챗봇 고유 URL 공유</text>

    <!-- 화살표: 61 → 온라인 채널 -->
    <line x1="250" y1="345" x2="250" y2="390" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- 화살표: 62 → 오프라인 채널 -->
    <line x1="750" y1="345" x2="750" y2="390" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- 온라인 배포 채널 -->
    <rect x="60" y="395" width="380" height="170" fill="none" stroke="black" stroke-width="1" stroke-dasharray="6,3" rx="5"/>
    <text x="250" y="425" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="18" font-weight="bold">온라인 채널</text>

    <rect x="80" y="440" width="110" height="35" fill="white" stroke="black" stroke-width="1" rx="3"/>
    <text x="135" y="463" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="15">웹사이트</text>

    <rect x="200" y="440" width="110" height="35" fill="white" stroke="black" stroke-width="1" rx="3"/>
    <text x="255" y="463" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="15">모바일 앱</text>

    <rect x="320" y="440" width="110" height="35" fill="white" stroke="black" stroke-width="1" rx="3"/>
    <text x="375" y="463" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="15">메시징 플랫폼</text>

    <rect x="80" y="485" width="110" height="35" fill="white" stroke="black" stroke-width="1" rx="3"/>
    <text x="135" y="508" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="15">SNS</text>

    <rect x="200" y="485" width="110" height="35" fill="white" stroke="black" stroke-width="1" rx="3"/>
    <text x="255" y="508" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="15">이메일 서명</text>

    <!-- 오프라인 배포 채널 — 높이 130→170으로 확장하여 4개 항목 수용 -->
    <rect x="560" y="395" width="380" height="170" fill="none" stroke="black" stroke-width="1" stroke-dasharray="6,3" rx="5"/>
    <text x="750" y="425" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="18" font-weight="bold">오프라인 채널</text>

    <rect x="580" y="440" width="100" height="35" fill="white" stroke="black" stroke-width="1" rx="3"/>
    <text x="630" y="463" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="15">명함</text>

    <rect x="700" y="440" width="100" height="35" fill="white" stroke="black" stroke-width="1" rx="3"/>
    <text x="750" y="463" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="15">포스터</text>

    <rect x="820" y="440" width="100" height="35" fill="white" stroke="black" stroke-width="1" rx="3"/>
    <text x="870" y="463" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="15">매장 안내판</text>

    <!-- (A) 브로셔 박스 추가 — 명함 아래 y=485 -->
    <rect x="580" y="485" width="100" height="35" fill="white" stroke="black" stroke-width="1" rx="3"/>
    <text x="630" y="508" text-anchor="middle" font-family="Malgun Gothic, AppleGothic, Dotum, sans-serif" font-size="15">브로셔</text>
</svg>
