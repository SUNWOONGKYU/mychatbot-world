<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1050" viewBox="0 0 1400 1050">
  <defs>
    <style>
      text { font-family: 'Malgun Gothic', 'Segoe UI', sans-serif; }
      .title { font-size: 26px; font-weight: bold; fill: #1A237E; }
      .subtitle { font-size: 14px; fill: #546E7A; }
      .section-title { font-size: 18px; font-weight: bold; }
      .box-title { font-size: 16px; font-weight: bold; }
      .box-body { font-size: 13px; fill: #37474F; }
      .arrow-text { font-size: 13px; font-weight: bold; }
      .badge-text { font-size: 12px; font-weight: bold; }
      .step-num { font-size: 11px; font-weight: bold; fill: #FFFFFF; }
      .legend-text { font-size: 12px; fill: #546E7A; }
    </style>
    <marker id="aDown" markerWidth="10" markerHeight="8" refX="5" refY="8" orient="auto">
      <polygon points="0 0, 10 0, 5 8" fill="#455A64"/>
    </marker>
    <marker id="aGreen" markerWidth="10" markerHeight="8" refX="5" refY="8" orient="auto">
      <polygon points="0 0, 10 0, 5 8" fill="#2E7D32"/>
    </marker>
    <marker id="aPurple" markerWidth="10" markerHeight="8" refX="5" refY="8" orient="auto">
      <polygon points="0 0, 10 0, 5 8" fill="#6A1B9A"/>
    </marker>
    <marker id="aRed" markerWidth="10" markerHeight="8" refX="5" refY="8" orient="auto">
      <polygon points="0 0, 10 0, 5 8" fill="#C62828"/>
    </marker>
    <marker id="aRedUp" markerWidth="10" markerHeight="8" refX="5" refY="0" orient="auto">
      <polygon points="0 8, 10 8, 5 0" fill="#C62828"/>
    </marker>
    <marker id="aRedR" markerWidth="8" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0 0, 8 5, 0 10" fill="#C62828"/>
    </marker>
    <marker id="aGreenDL" markerWidth="10" markerHeight="8" refX="5" refY="8" orient="auto">
      <polygon points="0 0, 10 0, 5 8" fill="#388E3C"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- ========== BACKGROUND ========== -->
  <rect width="1400" height="1050" fill="#F8F9FA"/>

  <!-- ========== TITLE ========== -->
  <text x="700" y="42" text-anchor="middle" class="title">Agent SDK 통합 아키텍처 (v18.4)</text>
  <text x="700" y="64" text-anchor="middle" class="subtitle">CPC 명령 자동 수신 / Agent SDK 자동 실행 / CPC DONE 자동 반환</text>

  <!-- ========== ROW 1: 사용자 + 웹챗봇 ========== -->
  <rect x="500" y="90" width="400" height="80" rx="14" fill="#E3F2FD" stroke="#1565C0" stroke-width="2" filter="url(#shadow)"/>
  <text x="700" y="118" text-anchor="middle" class="box-title" fill="#0D47A1">사용자  /  웹챗봇 (Vercel)</text>
  <text x="700" y="140" text-anchor="middle" class="box-body">Trade 연락병 페르소나  |  Claude 연락병 페르소나</text>
  <!-- timeout badge -->
  <rect x="910" y="104" width="110" height="26" rx="13" fill="#FFF9C4" stroke="#F9A825" stroke-width="1.2"/>
  <text x="965" y="122" text-anchor="middle" class="badge-text" fill="#E65100">1분 타임아웃</text>

  <!-- Step 1 circle -->
  <circle cx="700" cy="190" r="14" fill="#455A64"/>
  <text x="700" y="195" text-anchor="middle" class="step-num">1</text>
  <!-- Arrow: webchatbot → CPC -->
  <line x1="700" y1="170" x2="700" y2="176" stroke="#455A64" stroke-width="2.5"/>
  <line x1="700" y1="204" x2="700" y2="228" stroke="#455A64" stroke-width="2.5" marker-end="url(#aDown)"/>
  <text x="740" y="194" class="arrow-text" fill="#455A64">POST 명령</text>

  <!-- ========== ROW 2: CPC ========== -->
  <rect x="350" y="236" width="700" height="110" rx="14" fill="#FFF3E0" stroke="#E65100" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="700" y="264" text-anchor="middle" class="box-title" fill="#BF360C">CPC (Claude Platoons Control)</text>
  <text x="700" y="284" text-anchor="middle" class="box-body">Vercel API + Supabase (서울 리전)</text>

  <!-- Two platoon boxes inside CPC -->
  <rect x="376" y="296" width="280" height="38" rx="8" fill="#FFE0B2" stroke="#FF8F00" stroke-width="1.5"/>
  <text x="516" y="320" text-anchor="middle" class="badge-text" fill="#E65100">mychatbot-trader 소대</text>

  <rect x="744" y="296" width="280" height="38" rx="8" fill="#FFE0B2" stroke="#FF8F00" stroke-width="1.5"/>
  <text x="884" y="320" text-anchor="middle" class="badge-text" fill="#E65100">mychatbot-1 / 2 / 3 소대</text>

  <!-- ========== DIVIDER: 좌/우 경로 ========== -->
  <line x1="700" y1="380" x2="700" y2="980" stroke="#CFD8DC" stroke-width="1.5" stroke-dasharray="8,5"/>

  <!-- ========== LEFT COLUMN HEADER ========== -->
  <rect x="40" y="380" width="620" height="40" rx="10" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1.5"/>
  <text x="350" y="406" text-anchor="middle" class="section-title" fill="#2E7D32">Trade 연락병 경로  (트레이딩 PC)</text>

  <!-- ========== RIGHT COLUMN HEADER ========== -->
  <rect x="740" y="380" width="620" height="40" rx="10" fill="#EDE7F6" stroke="#AB47BC" stroke-width="1.5"/>
  <text x="1050" y="406" text-anchor="middle" class="section-title" fill="#6A1B9A">Claude 연락병 경로  (개발 PC)</text>

  <!-- ===== LEFT: Step 2 — Supabase Realtime ===== -->
  <circle cx="350" cy="456" r="14" fill="#2E7D32"/>
  <text x="350" y="461" text-anchor="middle" class="step-num">2</text>
  <line x1="516" y1="334" x2="350" y2="440" stroke="#2E7D32" stroke-width="2.5"/>
  <text x="400" y="456" class="arrow-text" fill="#2E7D32">Supabase Realtime</text>

  <!-- ===== RIGHT: Step 2 — Supabase Realtime ===== -->
  <circle cx="1050" cy="456" r="14" fill="#2E7D32"/>
  <text x="1050" y="461" text-anchor="middle" class="step-num">2</text>
  <line x1="884" y1="334" x2="1050" y2="440" stroke="#2E7D32" stroke-width="2.5"/>
  <text x="1100" y="456" class="arrow-text" fill="#2E7D32">Supabase Realtime</text>

  <!-- ===== LEFT ROW 3: Agent Server ===== -->
  <rect x="120" y="490" width="460" height="90" rx="12" fill="#C8E6C9" stroke="#388E3C" stroke-width="2" filter="url(#shadow)"/>
  <text x="350" y="518" text-anchor="middle" class="box-title" fill="#1B5E20">trader-bot / agent_server.py</text>
  <text x="350" y="540" text-anchor="middle" class="box-body">Supabase Realtime 구독  (실패 시 HTTP 1초 폴링)</text>
  <text x="350" y="560" text-anchor="middle" class="box-body">PENDING 감지 --> ACK --> Agent SDK 호출 --> DONE</text>

  <!-- ===== RIGHT ROW 3: Agent Server ===== -->
  <rect x="820" y="490" width="460" height="90" rx="12" fill="#C8E6C9" stroke="#388E3C" stroke-width="2" filter="url(#shadow)"/>
  <text x="1050" y="518" text-anchor="middle" class="box-title" fill="#1B5E20">cpc-agent-server / server.py</text>
  <text x="1050" y="540" text-anchor="middle" class="box-body">Supabase Realtime 구독  (실패 시 HTTP 1초 폴링)</text>
  <text x="1050" y="560" text-anchor="middle" class="box-body">PENDING 감지 --> ACK --> Agent SDK 호출 --> DONE</text>

  <!-- ===== LEFT: Step 3 arrow ===== -->
  <circle cx="350" cy="610" r="14" fill="#6A1B9A"/>
  <text x="350" y="615" text-anchor="middle" class="step-num">3</text>
  <line x1="350" y1="580" x2="350" y2="596" stroke="#6A1B9A" stroke-width="2.5"/>
  <line x1="350" y1="624" x2="350" y2="646" stroke="#6A1B9A" stroke-width="2.5" marker-end="url(#aPurple)"/>
  <text x="412" y="614" class="arrow-text" fill="#6A1B9A">Agent SDK query()</text>

  <!-- ===== RIGHT: Step 3 arrow ===== -->
  <circle cx="1050" cy="610" r="14" fill="#6A1B9A"/>
  <text x="1050" y="615" text-anchor="middle" class="step-num">3</text>
  <line x1="1050" y1="580" x2="1050" y2="596" stroke="#6A1B9A" stroke-width="2.5"/>
  <line x1="1050" y1="624" x2="1050" y2="646" stroke="#6A1B9A" stroke-width="2.5" marker-end="url(#aPurple)"/>
  <text x="1112" y="614" class="arrow-text" fill="#6A1B9A">Agent SDK query()</text>

  <!-- ===== LEFT ROW 4: Claude Code ===== -->
  <rect x="120" y="654" width="460" height="80" rx="12" fill="#E1BEE7" stroke="#7B1FA2" stroke-width="2" filter="url(#shadow)"/>
  <text x="350" y="682" text-anchor="middle" class="box-title" fill="#4A148C">Claude Code  (Opus)</text>
  <text x="350" y="704" text-anchor="middle" class="box-body">cwd = trader-bot/</text>
  <text x="350" y="722" text-anchor="middle" class="box-body">Read / Write / Edit / Bash / Glob / Grep</text>
  <!-- budget -->
  <rect x="480" y="660" width="96" height="24" rx="12" fill="#FF8F00" stroke="#E65100" stroke-width="1.2"/>
  <text x="528" y="677" text-anchor="middle" class="badge-text" fill="#FFFFFF">$0.50/cmd</text>

  <!-- ===== RIGHT ROW 4: Claude Code ===== -->
  <rect x="820" y="654" width="460" height="80" rx="12" fill="#E1BEE7" stroke="#7B1FA2" stroke-width="2" filter="url(#shadow)"/>
  <text x="1050" y="682" text-anchor="middle" class="box-title" fill="#4A148C">Claude Code  (Opus)</text>
  <text x="1050" y="704" text-anchor="middle" class="box-body">cwd = mychatbot-world/</text>
  <text x="1050" y="722" text-anchor="middle" class="box-body">Read / Write / Edit / Bash / Glob / Grep</text>
  <!-- budget -->
  <rect x="1180" y="660" width="96" height="24" rx="12" fill="#6A1B9A" stroke="#4A148C" stroke-width="1.2"/>
  <text x="1228" y="677" text-anchor="middle" class="badge-text" fill="#FFFFFF">$1.00/cmd</text>

  <!-- ===== LEFT: Step 4 arrow ===== -->
  <line x1="350" y1="734" x2="350" y2="770" stroke="#455A64" stroke-width="2" marker-end="url(#aDown)"/>

  <!-- ===== RIGHT: Step 4 arrow ===== -->
  <line x1="1050" y1="734" x2="1050" y2="770" stroke="#455A64" stroke-width="2" marker-end="url(#aDown)"/>

  <!-- ===== LEFT ROW 5: 실행 대상 ===== -->
  <rect x="80" y="778" width="240" height="100" rx="10" fill="#DCEDC8" stroke="#558B2F" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="200" y="804" text-anchor="middle" class="box-title" fill="#33691E">KIS API</text>
  <text x="200" y="824" text-anchor="middle" class="box-body">시세 조회 / 주문 / 잔고</text>
  <line x1="90" y1="836" x2="310" y2="836" stroke="#8BC34A" stroke-width="1"/>
  <text x="200" y="856" text-anchor="middle" class="box-body">analysis.py (5대장+2쫄병)</text>
  <text x="200" y="873" text-anchor="middle" class="box-body">knowledge/ (전략/규칙)</text>

  <rect x="360" y="778" width="240" height="100" rx="10" fill="#DCEDC8" stroke="#558B2F" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="480" y="804" text-anchor="middle" class="box-title" fill="#33691E">ai.py</text>
  <text x="480" y="824" text-anchor="middle" class="box-body">Intent 파싱 (자연어-->의도)</text>
  <line x1="370" y1="836" x2="590" y2="836" stroke="#8BC34A" stroke-width="1"/>
  <text x="480" y="856" text-anchor="middle" class="box-body">screener.py (종목 필터)</text>
  <text x="480" y="873" text-anchor="middle" class="box-body">sentry.py (자율매매 보초병)</text>

  <!-- ===== RIGHT ROW 5: 실행 대상 ===== -->
  <rect x="780" y="778" width="240" height="100" rx="10" fill="#D1C4E9" stroke="#7B1FA2" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="900" y="804" text-anchor="middle" class="box-title" fill="#4A148C">코드 작업</text>
  <text x="900" y="824" text-anchor="middle" class="box-body">읽기 / 수정 / 검색 / 삭제</text>
  <line x1="790" y1="836" x2="1010" y2="836" stroke="#AB47BC" stroke-width="1"/>
  <text x="900" y="856" text-anchor="middle" class="box-body">Vercel 배포 (git push)</text>
  <text x="900" y="873" text-anchor="middle" class="box-body">CLAUDE.md 설정 적용</text>

  <rect x="1060" y="778" width="240" height="100" rx="10" fill="#D1C4E9" stroke="#7B1FA2" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="1180" y="804" text-anchor="middle" class="box-title" fill="#4A148C">스킬 실행</text>
  <text x="1180" y="824" text-anchor="middle" class="box-body">소대 편성 / 서브에이전트</text>
  <line x1="1070" y1="836" x2="1290" y2="836" stroke="#AB47BC" stroke-width="1"/>
  <text x="1180" y="856" text-anchor="middle" class="box-body">이미지/문서 생성</text>
  <text x="1180" y="873" text-anchor="middle" class="box-body">테스트 / 디버깅</text>

  <!-- ===== RETURN: Step 5 — CPC DONE ===== -->
  <!-- Left return -->
  <rect x="56" y="910" width="590" height="36" rx="10" fill="#FFEBEE" stroke="#C62828" stroke-width="1.5"/>
  <circle cx="80" cy="928" r="14" fill="#C62828"/>
  <text x="80" y="933" text-anchor="middle" class="step-num">5</text>
  <text x="350" y="934" text-anchor="middle" class="arrow-text" fill="#C62828">결과 텍스트 --> CPC DONE --> 웹챗봇 채팅창 표시</text>

  <!-- Right return -->
  <rect x="754" y="910" width="590" height="36" rx="10" fill="#FFEBEE" stroke="#C62828" stroke-width="1.5"/>
  <circle cx="778" cy="928" r="14" fill="#C62828"/>
  <text x="778" y="933" text-anchor="middle" class="step-num">5</text>
  <text x="1050" y="934" text-anchor="middle" class="arrow-text" fill="#C62828">결과 텍스트 --> CPC DONE --> 웹챗봇 채팅창 표시</text>

  <!-- ========== LEGEND ========== -->
  <rect x="40" y="970" width="1320" height="60" rx="12" fill="#ECEFF1" stroke="#B0BEC5" stroke-width="1"/>

  <!-- Legend items -->
  <rect x="70" y="988" width="18" height="18" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.2"/>
  <text x="96" y="1003" class="legend-text">웹챗봇</text>

  <rect x="175" y="988" width="18" height="18" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1.2"/>
  <text x="201" y="1003" class="legend-text">CPC (Supabase)</text>

  <rect x="340" y="988" width="18" height="18" rx="4" fill="#C8E6C9" stroke="#388E3C" stroke-width="1.2"/>
  <text x="366" y="1003" class="legend-text">Agent Server</text>

  <rect x="490" y="988" width="18" height="18" rx="4" fill="#E1BEE7" stroke="#7B1FA2" stroke-width="1.2"/>
  <text x="516" y="1003" class="legend-text">Claude Code</text>

  <rect x="630" y="988" width="18" height="18" rx="4" fill="#DCEDC8" stroke="#558B2F" stroke-width="1.2"/>
  <text x="656" y="1003" class="legend-text">트레이딩 도구</text>

  <rect x="780" y="988" width="18" height="18" rx="4" fill="#D1C4E9" stroke="#7B1FA2" stroke-width="1.2"/>
  <text x="806" y="1003" class="legend-text">개발 도구</text>

  <rect x="910" y="988" width="18" height="18" rx="4" fill="#FFEBEE" stroke="#C62828" stroke-width="1.2"/>
  <text x="936" y="1003" class="legend-text">결과 반환</text>

  <!-- Step numbers explanation -->
  <circle cx="1080" cy="997" r="10" fill="#455A64"/>
  <text x="1080" y="1001" text-anchor="middle" style="font-size:9px;font-weight:bold;fill:#fff;">N</text>
  <text x="1100" y="1003" class="legend-text">= 단계 번호 (1~5)</text>
</svg>
