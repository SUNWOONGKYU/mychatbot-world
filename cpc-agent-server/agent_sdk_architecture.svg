<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1280" viewBox="0 0 1400 1280">
  <defs>
    <style>
      text { font-family: 'Malgun Gothic', 'Segoe UI', sans-serif; }
      .title { font-size: 26px; font-weight: bold; fill: #1A237E; }
      .subtitle { font-size: 14px; fill: #546E7A; }
      .section-title { font-size: 18px; font-weight: bold; }
      .box-title { font-size: 16px; font-weight: bold; }
      .box-body { font-size: 13px; fill: #37474F; }
      .arrow-text { font-size: 13px; font-weight: bold; }
      .badge-text { font-size: 12px; font-weight: bold; }
      .step-num { font-size: 11px; font-weight: bold; fill: #FFFFFF; }
      .legend-text { font-size: 12px; fill: #546E7A; }
      .prereq-title { font-size: 15px; font-weight: bold; fill: #37474F; }
      .prereq-body { font-size: 13px; fill: #546E7A; }
    </style>
    <marker id="aDown" markerWidth="10" markerHeight="8" refX="5" refY="8" orient="auto">
      <polygon points="0 0, 10 0, 5 8" fill="#455A64"/>
    </marker>
    <marker id="aGreenDown" markerWidth="10" markerHeight="8" refX="5" refY="8" orient="auto">
      <polygon points="0 0, 10 0, 5 8" fill="#2E7D32"/>
    </marker>
    <marker id="aPurple" markerWidth="10" markerHeight="8" refX="5" refY="8" orient="auto">
      <polygon points="0 0, 10 0, 5 8" fill="#6A1B9A"/>
    </marker>
    <marker id="aRed" markerWidth="10" markerHeight="8" refX="5" refY="8" orient="auto">
      <polygon points="0 0, 10 0, 5 8" fill="#C62828"/>
    </marker>
    <marker id="aDownBlue" markerWidth="10" markerHeight="8" refX="5" refY="8" orient="auto">
      <polygon points="0 0, 10 0, 5 8" fill="#0288D1"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- ========== BACKGROUND ========== -->
  <rect width="1400" height="1280" fill="#F8F9FA"/>

  <!-- ========== TITLE ========== -->
  <text x="700" y="42" text-anchor="middle" class="title">CPC + Remote Control 아키텍처 (v18.5)</text>
  <text x="700" y="64" text-anchor="middle" class="subtitle">트레이딩: Agent SDK 자동 처리 | 개발: Remote Control 직접 접속 -- 2026.02.28</text>

  <!-- ================================================================ -->
  <!-- PREREQUISITE: /cpc-engage 사전 프로세스 (전폭)                     -->
  <!-- ================================================================ -->
  <rect x="40" y="82" width="1320" height="75" rx="14" fill="#FFF8E1" stroke="#F9A825" stroke-width="2" filter="url(#shadow)"/>
  <rect x="40" y="82" width="1320" height="32" rx="14" fill="#F9A825"/>
  <rect x="40" y="100" width="1320" height="14" fill="#F9A825"/>
  <text x="700" y="104" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">사전 프로세스: PC에서 /cpc-engage 실행 (양쪽 공통)</text>

  <text x="80" y="135" class="prereq-title">/cpc-engage 실행</text>
  <text x="240" y="135" class="prereq-body">소대장 인식 + 세션 ID 저장 + Agent Server 가동 + CPC RUNNING + PENDING 처리</text>
  <text x="80" y="155" class="prereq-title">/remote-control</text>
  <text x="240" y="155" class="prereq-body">(선택) 채팅창에서 실행 --> 리모트 URL 생성 --> CPC에 저장 --> 연락병이 조회 가능</text>

  <!-- ========== DIVIDER (양쪽 경로 분리) ========== -->
  <line x1="700" y1="200" x2="700" y2="1200" stroke="#CFD8DC" stroke-width="1.5" stroke-dasharray="8,5"/>

  <!-- ================================================================ -->
  <!-- LEFT: Trade 연락병 경로 (트레이딩 PC) — Agent SDK 자동 처리       -->
  <!-- ================================================================ -->
  <rect x="40" y="200" width="620" height="40" rx="10" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1.5"/>
  <text x="350" y="226" text-anchor="middle" class="section-title" fill="#2E7D32">Trade 연락병 경로 (트레이딩 PC) -- Agent SDK</text>

  <!-- L1: 사용자 모바일 -->
  <rect x="120" y="260" width="460" height="60" rx="14" fill="#E3F2FD" stroke="#1565C0" stroke-width="2" filter="url(#shadow)"/>
  <text x="350" y="288" text-anchor="middle" class="box-title" fill="#0D47A1">모바일 / 웹챗봇 (Trade 연락병)</text>
  <text x="350" y="308" text-anchor="middle" class="box-body">음성/텍스트로 트레이딩 명령</text>

  <!-- Step 1 -->
  <circle cx="350" cy="340" r="14" fill="#455A64"/>
  <text x="350" y="345" text-anchor="middle" class="step-num">1</text>
  <line x1="350" y1="320" x2="350" y2="326" stroke="#455A64" stroke-width="2.5"/>
  <line x1="350" y1="354" x2="350" y2="375" stroke="#455A64" stroke-width="2.5" marker-end="url(#aDown)"/>
  <text x="395" y="343" class="arrow-text" fill="#455A64">CPC POST</text>

  <!-- L2: CPC -->
  <rect x="120" y="383" width="460" height="65" rx="14" fill="#FFF3E0" stroke="#E65100" stroke-width="2" filter="url(#shadow)"/>
  <text x="350" y="411" text-anchor="middle" class="box-title" fill="#BF360C">CPC (Supabase)</text>
  <text x="350" y="431" text-anchor="middle" class="box-body">trader-bot 소대 | PENDING --> ACKED --> DONE</text>

  <!-- Step 2 -->
  <circle cx="350" cy="470" r="14" fill="#2E7D32"/>
  <text x="350" y="475" text-anchor="middle" class="step-num">2</text>
  <line x1="350" y1="448" x2="350" y2="456" stroke="#2E7D32" stroke-width="2.5"/>
  <line x1="350" y1="484" x2="350" y2="505" stroke="#2E7D32" stroke-width="2.5" marker-end="url(#aGreenDown)"/>
  <text x="415" y="473" class="arrow-text" fill="#2E7D32">Realtime/폴링</text>

  <!-- L3: Agent Server -->
  <rect x="120" y="513" width="460" height="75" rx="12" fill="#C8E6C9" stroke="#388E3C" stroke-width="2" filter="url(#shadow)"/>
  <text x="350" y="541" text-anchor="middle" class="box-title" fill="#1B5E20">trader-bot / agent_server.py</text>
  <text x="350" y="561" text-anchor="middle" class="box-body">Supabase Realtime + HTTP 1초 폴링</text>
  <text x="350" y="577" text-anchor="middle" class="box-body">PENDING 감지 --> ACK --> Agent SDK --> DONE</text>

  <!-- Step 3 -->
  <circle cx="350" cy="615" r="14" fill="#6A1B9A"/>
  <text x="350" y="620" text-anchor="middle" class="step-num">3</text>
  <line x1="350" y1="588" x2="350" y2="601" stroke="#6A1B9A" stroke-width="2.5"/>
  <line x1="350" y1="629" x2="350" y2="650" stroke="#6A1B9A" stroke-width="2.5" marker-end="url(#aPurple)"/>
  <text x="420" y="619" class="arrow-text" fill="#6A1B9A">Agent SDK query()</text>

  <!-- L4: Claude Code -->
  <rect x="120" y="658" width="460" height="70" rx="12" fill="#E1BEE7" stroke="#7B1FA2" stroke-width="2" filter="url(#shadow)"/>
  <text x="350" y="686" text-anchor="middle" class="box-title" fill="#4A148C">Claude Code (Opus)</text>
  <text x="350" y="706" text-anchor="middle" class="box-body">cwd = trader-bot/ | 자동 실행 | 결과 반환</text>
  <rect x="480" y="664" width="96" height="24" rx="12" fill="#FF8F00" stroke="#E65100" stroke-width="1.2"/>
  <text x="528" y="681" text-anchor="middle" class="badge-text" fill="#FFFFFF">$0.50/cmd</text>

  <!-- L5: 실행 대상 -->
  <line x1="350" y1="728" x2="350" y2="753" stroke="#455A64" stroke-width="2" marker-end="url(#aDown)"/>

  <rect x="80" y="761" width="250" height="85" rx="10" fill="#DCEDC8" stroke="#558B2F" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="205" y="785" text-anchor="middle" class="box-title" fill="#33691E">KIS API</text>
  <text x="205" y="805" text-anchor="middle" class="box-body">시세 조회 / 주문 / 잔고</text>
  <text x="205" y="823" text-anchor="middle" class="box-body">analysis.py (5대장+2쫄병)</text>
  <text x="205" y="839" text-anchor="middle" class="box-body">knowledge/ (전략/규칙)</text>

  <rect x="350" y="761" width="250" height="85" rx="10" fill="#DCEDC8" stroke="#558B2F" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="475" y="785" text-anchor="middle" class="box-title" fill="#33691E">ai.py</text>
  <text x="475" y="805" text-anchor="middle" class="box-body">Intent 파싱 (자연어-->의도)</text>
  <text x="475" y="823" text-anchor="middle" class="box-body">screener.py (종목 필터)</text>
  <text x="475" y="839" text-anchor="middle" class="box-body">sentry.py (자율매매 보초병)</text>

  <!-- L6: 결과 반환 -->
  <rect x="80" y="870" width="520" height="36" rx="10" fill="#FFEBEE" stroke="#C62828" stroke-width="1.5"/>
  <circle cx="104" cy="888" r="14" fill="#C62828"/>
  <text x="104" y="893" text-anchor="middle" class="step-num">5</text>
  <text x="350" y="894" text-anchor="middle" class="arrow-text" fill="#C62828">결과 텍스트 --> CPC DONE --> 웹챗봇 표시</text>

  <!-- ================================================================ -->
  <!-- RIGHT: Claude 연락병 경로 (개발 PC) — Remote Control 직접 접속    -->
  <!-- ================================================================ -->
  <rect x="740" y="200" width="620" height="40" rx="10" fill="#E1F5FE" stroke="#0288D1" stroke-width="1.5"/>
  <text x="1050" y="226" text-anchor="middle" class="section-title" fill="#01579B">Claude 연락병 경로 (개발 PC) -- Remote Control</text>

  <!-- R1: 모바일 웹챗봇 (Claude 연락병) — 시작점 -->
  <rect x="800" y="260" width="500" height="60" rx="14" fill="#E3F2FD" stroke="#1565C0" stroke-width="2" filter="url(#shadow)"/>
  <text x="1050" y="285" text-anchor="middle" class="box-title" fill="#0D47A1">모바일 / 웹챗봇 (Claude 연락병)</text>
  <text x="1050" y="305" text-anchor="middle" class="box-body">"리모트 연결해줘" --> 연락병이 CPC 명령 생성</text>

  <!-- Step 1 -->
  <circle cx="1050" cy="340" r="14" fill="#455A64"/>
  <text x="1050" y="345" text-anchor="middle" class="step-num">1</text>
  <line x1="1050" y1="320" x2="1050" y2="326" stroke="#455A64" stroke-width="2.5"/>
  <line x1="1050" y1="354" x2="1050" y2="375" stroke="#455A64" stroke-width="2.5" marker-end="url(#aDown)"/>
  <text x="1120" y="343" class="arrow-text" fill="#455A64">CPC POST</text>

  <!-- R2: CPC -->
  <rect x="800" y="383" width="500" height="65" rx="14" fill="#FFF3E0" stroke="#E65100" stroke-width="2" filter="url(#shadow)"/>
  <text x="1050" y="411" text-anchor="middle" class="box-title" fill="#BF360C">CPC (Supabase)</text>
  <text x="1050" y="431" text-anchor="middle" class="box-body">mychatbot-N 소대 | "리모트 연결" 명령 PENDING</text>

  <!-- Step 2 -->
  <circle cx="1050" cy="473" r="14" fill="#2E7D32"/>
  <text x="1050" y="478" text-anchor="middle" class="step-num">2</text>
  <line x1="1050" y1="448" x2="1050" y2="459" stroke="#2E7D32" stroke-width="2.5"/>
  <line x1="1050" y1="487" x2="1050" y2="508" stroke="#2E7D32" stroke-width="2.5" marker-end="url(#aGreenDown)"/>
  <text x="1130" y="477" class="arrow-text" fill="#2E7D32">Realtime/폴링</text>

  <!-- R3: Agent Server 수신 -->
  <rect x="800" y="515" width="500" height="65" rx="12" fill="#C8E6C9" stroke="#388E3C" stroke-width="2" filter="url(#shadow)"/>
  <text x="1050" y="543" text-anchor="middle" class="box-title" fill="#1B5E20">Agent Server (server.py)</text>
  <text x="1050" y="563" text-anchor="middle" class="box-body">"리모트" 키워드 감지 --> start_remote_control()</text>

  <!-- Step 3 -->
  <circle cx="1050" cy="605" r="14" fill="#6A1B9A"/>
  <text x="1050" y="610" text-anchor="middle" class="step-num">3</text>
  <line x1="1050" y1="580" x2="1050" y2="591" stroke="#6A1B9A" stroke-width="2.5"/>
  <line x1="1050" y1="619" x2="1050" y2="640" stroke="#6A1B9A" stroke-width="2.5" marker-end="url(#aPurple)"/>
  <text x="1140" y="609" class="arrow-text" fill="#6A1B9A">claude /rc</text>

  <!-- R4: claude remote-control 실행 → URL 생성 -->
  <rect x="800" y="648" width="500" height="75" rx="12" fill="#E1BEE7" stroke="#7B1FA2" stroke-width="2" filter="url(#shadow)"/>
  <text x="1050" y="673" text-anchor="middle" class="box-title" fill="#4A148C">claude remote-control 실행</text>
  <text x="1050" y="693" text-anchor="middle" class="box-body">subprocess --> stdout에서 URL 캡처</text>
  <text x="1050" y="711" text-anchor="middle" class="box-body">https://claude.ai/code/session_xxx</text>
  <rect x="1190" y="653" width="105" height="26" rx="13" fill="#0288D1" stroke="#01579B" stroke-width="1.2"/>
  <text x="1242" y="671" text-anchor="middle" class="badge-text" fill="#FFFFFF">URL 생성</text>

  <!-- Step 4: URL → CPC DONE -->
  <circle cx="1050" cy="748" r="14" fill="#C62828"/>
  <text x="1050" y="753" text-anchor="middle" class="step-num">4</text>
  <line x1="1050" y1="723" x2="1050" y2="734" stroke="#C62828" stroke-width="2.5"/>
  <line x1="1050" y1="762" x2="1050" y2="783" stroke="#C62828" stroke-width="2.5" marker-end="url(#aRed)"/>
  <text x="1130" y="752" class="arrow-text" fill="#C62828">DONE+URL</text>

  <!-- R5: CPC DONE → 채팅창 URL 표시 -->
  <rect x="800" y="790" width="500" height="55" rx="14" fill="#FFEBEE" stroke="#C62828" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1050" y="814" text-anchor="middle" class="box-title" fill="#C62828">CPC DONE --> 채팅창 URL 표시</text>
  <text x="1050" y="832" text-anchor="middle" class="box-body">cpcSafeHtml: claude.ai/code URL을 클릭 가능 링크로 변환</text>

  <!-- Step 5: URL 클릭 → 접속 -->
  <circle cx="1050" cy="870" r="14" fill="#0288D1"/>
  <text x="1050" y="875" text-anchor="middle" class="step-num">5</text>
  <line x1="1050" y1="845" x2="1050" y2="856" stroke="#0288D1" stroke-width="2.5"/>
  <line x1="1050" y1="884" x2="1050" y2="905" stroke="#0288D1" stroke-width="2.5" marker-end="url(#aDownBlue)"/>
  <text x="1115" y="874" class="arrow-text" fill="#0288D1">URL 클릭</text>

  <!-- R6: claude.ai/code 직접 접속 -->
  <rect x="800" y="912" width="500" height="55" rx="14" fill="#B3E5FC" stroke="#0288D1" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="1050" y="937" text-anchor="middle" class="box-title" fill="#01579B">claude.ai/code -- 모바일 직접 접속</text>
  <text x="1050" y="955" text-anchor="middle" class="box-body">소대장 세션에서 직접 작업 지시 (코드/배포/스킬 등)</text>

  <!-- ================================================================ -->
  <!-- COMPARISON BOX                                                    -->
  <!-- ================================================================ -->
  <rect x="40" y="1000" width="1320" height="130" rx="14" fill="#FFFFFF" stroke="#B0BEC5" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="1000" width="1320" height="36" rx="14" fill="#546E7A"/>
  <rect x="40" y="1020" width="1320" height="16" fill="#546E7A"/>
  <text x="700" y="1025" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">두 경로 비교</text>

  <!-- Left comparison -->
  <text x="350" y="1062" text-anchor="middle" font-size="14" font-weight="bold" fill="#2E7D32">Trade 연락병 (Agent SDK)</text>
  <text x="350" y="1084" text-anchor="middle" class="box-body">자동화: 명령 --> Agent SDK --> 결과 반환</text>
  <text x="350" y="1102" text-anchor="middle" class="box-body">사용자 개입 없이 트레이딩 자동 처리</text>
  <text x="350" y="1120" text-anchor="middle" class="box-body">Agent Server 필수 (24시간 상주)</text>

  <line x1="700" y1="1045" x2="700" y2="1125" stroke="#CFD8DC" stroke-width="1"/>

  <!-- Right comparison -->
  <text x="1050" y="1062" text-anchor="middle" font-size="14" font-weight="bold" fill="#01579B">Claude 연락병 (Remote Control)</text>
  <text x="1050" y="1084" text-anchor="middle" class="box-body">온디맨드: 연락병 요청 --> Agent Server --> /rc URL 생성</text>
  <text x="1050" y="1102" text-anchor="middle" class="box-body">URL 클릭으로 모바일에서 소대장 직접 제어</text>
  <text x="1050" y="1120" text-anchor="middle" class="box-body">Agent Server 경유 (CPC 명령 수신 --> /rc 트리거)</text>

  <!-- ========== LEGEND ========== -->
  <rect x="40" y="1220" width="1320" height="42" rx="12" fill="#ECEFF1" stroke="#B0BEC5" stroke-width="1"/>

  <rect x="60" y="1232" width="18" height="18" rx="4" fill="#FFF8E1" stroke="#F9A825" stroke-width="1.2"/>
  <text x="86" y="1247" class="legend-text">사전 프로세스</text>

  <rect x="200" y="1232" width="18" height="18" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.2"/>
  <text x="226" y="1247" class="legend-text">웹챗봇/모바일</text>

  <rect x="340" y="1232" width="18" height="18" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1.2"/>
  <text x="366" y="1247" class="legend-text">CPC (Supabase)</text>

  <rect x="490" y="1232" width="18" height="18" rx="4" fill="#C8E6C9" stroke="#388E3C" stroke-width="1.2"/>
  <text x="516" y="1247" class="legend-text">Agent Server</text>

  <rect x="630" y="1232" width="18" height="18" rx="4" fill="#E1BEE7" stroke="#7B1FA2" stroke-width="1.2"/>
  <text x="656" y="1247" class="legend-text">Claude Code</text>

  <rect x="770" y="1232" width="18" height="18" rx="4" fill="#B3E5FC" stroke="#0288D1" stroke-width="1.2"/>
  <text x="796" y="1247" class="legend-text">Remote Control</text>

  <rect x="930" y="1232" width="18" height="18" rx="4" fill="#DCEDC8" stroke="#558B2F" stroke-width="1.2"/>
  <text x="956" y="1247" class="legend-text">트레이딩 도구</text>

  <rect x="1080" y="1232" width="18" height="18" rx="4" fill="#FFEBEE" stroke="#C62828" stroke-width="1.2"/>
  <text x="1106" y="1247" class="legend-text">결과 반환</text>

  <circle cx="1240" cy="1241" r="10" fill="#455A64"/>
  <text x="1240" y="1245" text-anchor="middle" style="font-size:9px;font-weight:bold;fill:#fff;">N</text>
  <text x="1260" y="1247" class="legend-text">= 단계 번호</text>
</svg>
