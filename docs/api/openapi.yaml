          schema:
            type: string
            description: 검색어
        - name: category
          in: query
          schema:
            type: string
            description: 카테고리 필터
      responses:
        '200':
          description: 스킬 목록
          content:
            application/json:
              schema:
                type: object
                properties:
                  skills:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                          example: 번역 도우미
                        category:
                          type: string
                          example: productivity
                        description:
                          type: string
                        isFree:
                          type: boolean
                        price:
                          type: integer
                        install_count:
                          type: integer
                        avg_rating:
                          type: number
                          nullable: true

  /api/skills/install:
    post:
      summary: 스킬 설치 (POST)
      operationId: installSkill
      tags:
        - Skills
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - skill_id
                - chatbot_id
              properties:
                skill_id:
                  type: string
                chatbot_id:
                  type: string
                  format: uuid
      responses:
        '201':
          description: 설치 완료
        '402':
          description: 크레딧 부족 (유료 스킬)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/skills/my:
    get:
      summary: 내 설치 스킬 목록 (GET)
      operationId: listMySkills
      tags:
        - Skills
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 설치된 스킬 목록
          content:
            application/json:
              schema:
                type: object
                properties:
                  skills:
                    type: array
                    items:
                      type: object

  # ── Settings ──────────────────────────────────

  /api/settings:
    get:
      summary: 봇 설정 조회 (GET)
      operationId: getBotSettings
      tags:
        - Settings
      security:
        - BearerAuth: []
      parameters:
        - name: chatbot_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 봇 설정 반환
          content:
            application/json:
              schema:
                type: object
                properties:
                  chatbot_id:
                    type: string
                    format: uuid
                  persona:
                    type: string
                  greeting:
                    type: string
                  model:
                    type: string
                    example: gpt-4o-mini
                  temperature:
                    type: number
                    minimum: 0.0
                    maximum: 2.0
                    example: 0.7
                  max_tokens:
                    type: integer
                    example: 1000
                  language:
                    type: string
                    example: ko
                  fallback_message:
                    type: string
                  use_kb:
                    type: boolean
                  kb_top_k:
                    type: integer
                    example: 3

    patch:
      summary: 봇 설정 업데이트 (PATCH)
      description: 봇 설정을 부분적으로 업데이트합니다 (upsert).
      operationId: updateBotSettings
      tags:
        - Settings
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - chatbot_id
              properties:
                chatbot_id:
                  type: string
                  format: uuid
                persona:
                  type: string
                greeting:
                  type: string
                model:
                  type: string
                temperature:
                  type: number
                max_tokens:
                  type: integer
                language:
                  type: string
                fallback_message:
                  type: string
                use_kb:
                  type: boolean
                kb_top_k:
                  type: integer
      responses:
        '200':
          description: 설정 업데이트 완료
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

