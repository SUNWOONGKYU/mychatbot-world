<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#fafafa"/>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 L2.5,5 Z" fill="#333"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 L2.5,5 Z" fill="#e53935"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 L2.5,5 Z" fill="#1565c0"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 L2.5,5 Z" fill="#2e7d32"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="28" font-weight="bold" fill="#222">CPC 명령 흐름 아키텍처</text>
  <text x="600" y="65" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="14" fill="#666">chatbot(mobile) -> CPC -> Agent Server -> Claude Code -> result -> chatbot</text>

  <!-- ==================== ROW 1: User + Chatbot ==================== -->

  <!-- User (mobile) -->
  <rect x="50" y="100" width="180" height="80" rx="40" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="140" y="135" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="16" font-weight="bold" fill="#1565c0">User (Mobile)</text>
  <text x="140" y="155" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="12" fill="#555">mychatbot.world</text>

  <!-- Chatbot -->
  <rect x="320" y="100" width="220" height="80" rx="10" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="430" y="130" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="16" font-weight="bold">Web Chatbot</text>
  <text x="430" y="150" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="12" fill="#555">chat.js + cpc-client.js</text>
  <text x="430" y="168" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="11" fill="#888">Claude/Trade 연락병 페르소나</text>

  <!-- Arrow: User → Chatbot -->
  <line x1="230" y1="140" x2="318" y2="140" stroke="#1565c0" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="275" y="133" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="11" fill="#1565c0">"리모트 연결"</text>

  <!-- ==================== ROW 2: AI Decision ==================== -->

  <!-- AI Decision Diamond -->
  <polygon points="430,230 520,270 430,310 340,270" fill="#fff3e0" stroke="#e65100" stroke-width="2"/>
  <text x="430" y="265" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="13" font-weight="bold" fill="#e65100">__SILENT__?</text>
  <text x="430" y="280" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="10" fill="#e65100">AI 연락병 판단</text>

  <!-- Arrow: Chatbot → AI Decision -->
  <line x1="430" y1="180" x2="430" y2="228" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>

  <!-- AI Direct Reply (left) -->
  <rect x="80" y="245" width="160" height="50" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="160" y="267" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="13" font-weight="bold" fill="#2e7d32">AI 직접 답변</text>
  <text x="160" y="283" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="10" fill="#555">인사, 일반 대화</text>

  <!-- Arrow: Decision → AI Direct (left) -->
  <line x1="340" y1="270" x2="242" y2="270" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="290" y="263" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="10" fill="#2e7d32">일반</text>

  <!-- ==================== ROW 3: CPC Command Flow ==================== -->

  <!-- CPC API (Vercel) -->
  <rect x="620" y="230" width="200" height="80" rx="10" fill="#ede7f6" stroke="#5e35b1" stroke-width="2"/>
  <text x="720" y="258" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="16" font-weight="bold" fill="#5e35b1">CPC API</text>
  <text x="720" y="275" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="11" fill="#555">Vercel + Supabase</text>
  <text x="720" y="295" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="10" fill="#888">cpc_commands table</text>

  <!-- Arrow: Decision → CPC (right, __SILENT__ path) -->
  <line x1="520" y1="270" x2="618" y2="270" stroke="#e53935" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="570" y="260" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="11" font-weight="bold" fill="#e53935">__SILENT__</text>
  <text x="570" y="285" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="10" fill="#888">POST command</text>

  <!-- ==================== TWO PATHS: Remote vs General ==================== -->

  <!-- Path Decision -->
  <polygon points="720,370 790,405 720,440 650,405" fill="#fce4ec" stroke="#c62828" stroke-width="2"/>
  <text x="720" y="400" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="12" font-weight="bold" fill="#c62828">리모트?</text>
  <text x="720" y="415" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="10" fill="#c62828">키워드 감지</text>

  <!-- Arrow: CPC → Path Decision -->
  <line x1="720" y1="310" x2="720" y2="368" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>
  <text x="730" y="340" font-family="Malgun Gothic, sans-serif" font-size="10" fill="#888">PENDING</text>

  <!-- ==================== LEFT PATH: Remote Control ==================== -->

  <!-- Remote: Direct URL from CPC data -->
  <rect x="320" y="380" width="230" height="70" rx="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="435" y="405" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="14" font-weight="bold" fill="#1565c0">session_url 직접 조회</text>
  <text x="435" y="425" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="11" fill="#555">cpc-client.js: _cpcPlatoons</text>
  <text x="435" y="440" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="10" fill="#888">AI 우회, JS에서 직접 반환</text>

  <!-- Arrow: Decision → Remote path -->
  <line x1="650" y1="405" x2="552" y2="405" stroke="#1565c0" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="600" y="397" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="10" fill="#1565c0">YES</text>

  <!-- Remote URL Result -->
  <rect x="340" y="490" width="190" height="50" rx="25" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="435" y="512" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="12" font-weight="bold" fill="#1565c0">claude.ai/code URL</text>
  <text x="435" y="528" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="10" fill="#555">clickable link</text>

  <!-- Arrow: Remote → URL -->
  <line x1="435" y1="450" x2="435" y2="488" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- ==================== RIGHT PATH: General Command ==================== -->

  <!-- Fork: Vercel AI + Agent Server -->
  <text x="900" y="390" font-family="Malgun Gothic, sans-serif" font-size="10" fill="#e53935" font-weight="bold">NO (일반 명령)</text>
  <line x1="790" y1="405" x2="850" y2="405" stroke="#e53935" stroke-width="2"/>

  <!-- Vercel AI (immediate) -->
  <rect x="850" y="370" width="180" height="55" rx="10" fill="#fff8e1" stroke="#f57f17" stroke-width="2"/>
  <text x="940" y="393" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="13" font-weight="bold" fill="#f57f17">Vercel AI Fallback</text>
  <text x="940" y="410" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="10" fill="#555">/api/cpc-process (즉시)</text>

  <!-- Agent Server -->
  <rect x="850" y="460" width="180" height="55" rx="10" fill="#fce4ec" stroke="#c62828" stroke-width="2"/>
  <text x="940" y="483" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="13" font-weight="bold" fill="#c62828">Agent Server</text>
  <text x="940" y="500" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="10" fill="#555">server.py (1초 폴링)</text>

  <!-- Arrow: Fork → Vercel AI -->
  <line x1="940" y1="405" x2="940" y2="405" stroke="none"/>

  <!-- Arrow: Fork → Agent Server -->
  <line x1="940" y1="425" x2="940" y2="458" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="955" y="445" font-family="Malgun Gothic, sans-serif" font-size="9" fill="#888">병행</text>

  <!-- ==================== ROW 4: Claude Code Execution ==================== -->

  <!-- Claude Code Headless -->
  <rect x="850" y="555" width="200" height="70" rx="10" fill="#e8eaf6" stroke="#283593" stroke-width="2"/>
  <text x="950" y="580" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="14" font-weight="bold" fill="#283593">Claude Code</text>
  <text x="950" y="598" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="11" fill="#555">claude -p (headless)</text>
  <text x="950" y="614" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="10" fill="#888">코드 읽기/수정/분석/배포</text>

  <!-- Arrow: Agent Server → Claude Code -->
  <line x1="940" y1="515" x2="940" y2="553" stroke="#283593" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ==================== ROW 5: Results Back ==================== -->

  <!-- Result flow back -->
  <rect x="600" y="560" width="160" height="50" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="680" y="582" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="13" font-weight="bold" fill="#2e7d32">CPC DONE</text>
  <text x="680" y="598" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="10" fill="#555">result 저장</text>

  <!-- Arrow: Claude Code → CPC DONE -->
  <line x1="848" y1="590" x2="762" y2="590" stroke="#2e7d32" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- Arrow: CPC DONE → Chatbot (poll) -->
  <path d="M 600,585 Q 430,585 430,530" fill="none" stroke="#2e7d32" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="500" y="575" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="10" fill="#2e7d32">3초 폴링</text>

  <!-- Final: Chatbot shows result -->
  <rect x="340" y="530" width="190" height="40" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="435" y="555" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="12" fill="#2e7d32">chatbot 결과 표시</text>

  <!-- ==================== REMOTE CONTROL SESSION FLOW ==================== -->

  <!-- Remote Control Session box -->
  <rect x="50" y="490" width="220" height="120" rx="10" fill="#e8eaf6" stroke="#283593" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="160" y="515" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="14" font-weight="bold" fill="#283593">Remote Control Session</text>
  <text x="160" y="535" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="11" fill="#555">claude remote-control</text>
  <text x="160" y="555" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="10" fill="#888">개발 PC에서 실행</text>
  <text x="160" y="575" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="10" fill="#888">URL -> CPC session_url에 저장</text>
  <text x="160" y="595" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="10" fill="#283593">User가 URL 클릭 -> 직접 접속</text>

  <!-- Arrow: Remote URL → Remote Session -->
  <line x1="340" y1="515" x2="272" y2="515" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-blue)"/>
  <text x="305" y="508" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="9" fill="#1565c0">click</text>

  <!-- ==================== LEGEND ==================== -->

  <rect x="50" y="660" width="1100" height="230" rx="8" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="600" y="690" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="18" font-weight="bold" fill="#333">Flow Legend + 문제점 분석</text>

  <!-- Legend items -->
  <line x1="80" y1="720" x2="120" y2="720" stroke="#1565c0" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="130" y="725" font-family="Malgun Gothic, sans-serif" font-size="12" fill="#333">리모트 연결 (session_url 직접 반환)</text>

  <line x1="80" y1="745" x2="120" y2="745" stroke="#e53935" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="130" y="750" font-family="Malgun Gothic, sans-serif" font-size="12" fill="#333">__SILENT__ 경로 (CPC 명령 생성)</text>

  <line x1="80" y1="770" x2="120" y2="770" stroke="#2e7d32" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="130" y="775" font-family="Malgun Gothic, sans-serif" font-size="12" fill="#333">결과 반환 (DONE -> chatbot 표시)</text>

  <!-- Problem Analysis -->
  <text x="550" y="720" font-family="Malgun Gothic, sans-serif" font-size="13" font-weight="bold" fill="#c62828">현재 문제점:</text>

  <text x="550" y="742" font-family="Malgun Gothic, sans-serif" font-size="12" fill="#333">1. Agent Server가 Windows/MSYS2에서 불안정 (프로세스 사망)</text>
  <text x="550" y="762" font-family="Malgun Gothic, sans-serif" font-size="12" fill="#333">2. remote-control URL은 별도 세션 생성 (이 대화창이 아님)</text>
  <text x="550" y="782" font-family="Malgun Gothic, sans-serif" font-size="12" fill="#333">3. claude -p (headless)도 별도 세션 (이 대화창이 아님)</text>

  <text x="550" y="810" font-family="Malgun Gothic, sans-serif" font-size="13" font-weight="bold" fill="#2e7d32">해결된 사항:</text>
  <text x="550" y="832" font-family="Malgun Gothic, sans-serif" font-size="12" fill="#333">A. __SILENT__ 시스템 프롬프트 모순 해결</text>
  <text x="550" y="852" font-family="Malgun Gothic, sans-serif" font-size="12" fill="#333">B. AI가 URL을 직접 반환하는 버그 -> session_url은 AI 우회, JS 직접 조회</text>
  <text x="550" y="872" font-family="Malgun Gothic, sans-serif" font-size="12" fill="#333">C. URL regex 수정 (code/ -> code[?/])</text>

  <!-- Key Insight box -->
  <rect x="70" y="800" width="430" height="80" rx="5" fill="#fff3e0" stroke="#e65100" stroke-width="2"/>
  <text x="285" y="822" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="13" font-weight="bold" fill="#e65100">핵심 인사이트</text>
  <text x="285" y="842" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="11" fill="#333">외부에서 이 대화창에 명령을 주입하는 유일한 방법:</text>
  <text x="285" y="862" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="12" font-weight="bold" fill="#c62828">remote-control URL로 직접 접속하여 타이핑</text>
  <text x="285" y="878" text-anchor="middle" font-family="Malgun Gothic, sans-serif" font-size="10" fill="#555">(CPC Agent Server는 headless 별도 세션에서 처리 -> 결과만 CPC로 반환)</text>
</svg>
