<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="3200" viewBox="0 0 800 3200" font-family="Pretendard, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif">
  <defs>
    <style><![CDATA[
      .h0   { font-size:44px; font-weight:900; fill:#0f172a; }
      .h1   { font-size:30px; font-weight:800; fill:#0f172a; }
      .h2   { font-size:24px; font-weight:800; fill:#0f172a; }
      .h3   { font-size:20px; font-weight:700; fill:#0f172a; }
      .lead { font-size:18px; font-weight:700; fill:#0f172a; }
      .body { font-size:16px;                  fill:#0f172a; }
      .sub  { font-size:14px;                  fill:#475569; }
      .step { font-size:22px; font-weight:900; fill:#ffffff; }
      .warn { fill:#dc2626;   font-weight:800; }
      .good { fill:#15803d;   font-weight:800; }
      .pill { font-size:16px; font-weight:700; fill:#0f172a; }
    ]]></style>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366f1"/><stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <rect width="800" height="3200" fill="#ffffff"/>

  <!-- HEADER -->
  <rect x="0" y="0" width="800" height="155" fill="#fde047"/>
  <rect x="0" y="155" width="800" height="5" fill="#0f172a"/>
  <text x="400" y="65"  class="h0" text-anchor="middle">CoCoBot 생성 위저드</text>
  <text x="400" y="105" class="h2" text-anchor="middle">— 전체 플로우 v3 —</text>
  <text x="400" y="135" class="body" text-anchor="middle">2026-04-20 · 8단계 · 아바타형/도우미형 · 위저드 1 페르소나</text>

  <!-- 영속화 -->
  <g transform="translate(24,185)">
    <rect width="752" height="75" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="16" y="32" class="h3">3-tier 영속화</text>
    <text x="16" y="58" class="body">sessionStorage(24h) → IndexedDB(임시) → Supabase(영구)</text>
  </g>

  <!-- STEP 1 -->
  <g transform="translate(24,280)">
    <rect width="752" height="160" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <rect width="752" height="44" rx="12" fill="url(#g1)"/>
    <rect y="32" width="752" height="12" fill="url(#g1)"/>
    <text x="16" y="30" class="step">① 기본 정보</text>
    <text x="16" y="76" class="lead">코코봇 이름 · 한 줄 소개 · URL</text>
    <text x="16" y="103" class="body">• 음성 + 텍스트 동시 입력</text>
    <text x="16" y="124" class="body">• 한글 → 영문 URL 자동 변환</text>
    <text x="16" y="148" class="body good">✓ 게스트 가능</text>
  </g>
  <text x="400" y="463" class="h2" text-anchor="middle" fill="#475569">↓</text>

  <!-- STEP 2 -->
  <g transform="translate(24,475)">
    <rect width="752" height="190" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <rect width="752" height="44" rx="12" fill="url(#g1)"/>
    <rect y="32" width="752" height="12" fill="url(#g1)"/>
    <text x="16" y="30" class="step">② 페르소나 선택 (1개 필수)</text>
    <text x="16" y="76" class="lead">아바타형 또는 도우미형 1개</text>
    <text x="16" y="103" class="body">• 7-preset 접힘형 카드</text>
    <text x="16" y="124" class="body">• AI 모델 + IQ↔EQ 슬라이더</text>
    <text x="16" y="148" class="body warn">★ 위저드 1개 / 추가는 마이페이지</text>
    <text x="16" y="172" class="body">한도: 아바타 5 + 도우미 5 = 10</text>
  </g>
  <text x="400" y="688" class="h2" text-anchor="middle" fill="#475569">↓</text>

  <!-- STEP 3 -->
  <g transform="translate(24,700)">
    <rect width="752" height="160" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <rect width="752" height="44" rx="12" fill="url(#g1)"/>
    <rect y="32" width="752" height="12" fill="url(#g1)"/>
    <text x="16" y="30" class="step">③ 인터뷰</text>
    <text x="16" y="76" class="lead">자기소개 (음성 + 텍스트 동시)</text>
    <text x="16" y="103" class="body">• Web Speech API · 3분 타이머</text>
    <text x="16" y="124" class="body">• 텍스트 2000자 카운터</text>
    <text x="16" y="148" class="body warn">현재 BUG: 탭 토글 → 동시 입력으로 수정</text>
  </g>
  <text x="400" y="883" class="h2" text-anchor="middle" fill="#475569">↓</text>

  <!-- STEP 4 -->
  <g transform="translate(24,895)">
    <rect width="752" height="145" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <rect width="752" height="44" rx="12" fill="url(#g1)"/>
    <rect y="32" width="752" height="12" fill="url(#g1)"/>
    <text x="16" y="30" class="step">④ AI 분석</text>
    <text x="16" y="76" class="lead">인터뷰 → FAQ 자동 생성</text>
    <text x="16" y="103" class="body">• OpenAI 분석 · 키워드 추출 · 시드 FAQ</text>
    <text x="16" y="130" class="body good">✓ 게스트 가능</text>
  </g>
  <text x="400" y="1063" class="h2" text-anchor="middle" fill="#dc2626">↓</text>

  <!-- STEP 5 -->
  <g transform="translate(24,1075)">
    <rect width="752" height="190" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="3"/>
    <rect width="752" height="44" rx="12" fill="#dc2626"/>
    <rect y="32" width="752" height="12" fill="#dc2626"/>
    <text x="16" y="30" class="step">⑤ 코코봇 생성 (DB) 🔒</text>
    <text x="16" y="76" class="lead warn">★ AUTH GATE — 로그인 필수</text>
    <text x="16" y="103" class="body">• POST /api/create-bot/deploy</text>
    <text x="16" y="124" class="body">• bots + personas + knowledge</text>
    <text x="16" y="148" class="body">• 미로그인 → 로그인 모달</text>
    <text x="16" y="172" class="body">• draft sessionStorage 24h 보존 후 재개</text>
  </g>
  <text x="400" y="1288" class="h2" text-anchor="middle" fill="#475569">↓</text>

  <!-- STEP 6 -->
  <g transform="translate(24,1300)">
    <rect width="752" height="140" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <rect width="752" height="44" rx="12" fill="url(#g1)"/>
    <rect y="32" width="752" height="12" fill="url(#g1)"/>
    <text x="16" y="30" class="step">⑥ 아바타</text>
    <text x="16" y="76" class="lead">이미지 업로드 또는 AI 생성</text>
    <text x="16" y="103" class="body">• 사진 / 이모지 / DALL·E</text>
    <text x="16" y="127" class="body">→ bots.avatar_url</text>
  </g>
  <text x="400" y="1463" class="h2" text-anchor="middle" fill="#475569">↓</text>

  <!-- STEP 7 -->
  <g transform="translate(24,1475)">
    <rect width="752" height="125" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <rect width="752" height="44" rx="12" fill="url(#g1)"/>
    <rect y="32" width="752" height="12" fill="url(#g1)"/>
    <text x="16" y="30" class="step">⑦ 테마</text>
    <text x="16" y="76" class="lead">대화창 색상 · 배경 · 버블 스타일</text>
    <text x="16" y="110" class="body">→ bots.theme jsonb</text>
  </g>
  <text x="400" y="1623" class="h2" text-anchor="middle" fill="#16a34a">↓</text>

  <!-- STEP 8 -->
  <g transform="translate(24,1635)">
    <rect width="752" height="170" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="3"/>
    <rect width="752" height="44" rx="12" fill="#16a34a"/>
    <rect y="32" width="752" height="12" fill="#16a34a"/>
    <text x="16" y="30" class="step">⑧ 배포 🎉</text>
    <text x="16" y="76" class="lead good">URL · QR · 채널</text>
    <text x="16" y="103" class="body">• cocobot.world/bot/&lt;username&gt;</text>
    <text x="16" y="124" class="body">• QR 코드 (SVG)</text>
    <text x="16" y="148" class="body">• 웹 / 카카오 / 텔레그램 → 마이페이지</text>
  </g>

  <!-- ZOOM 헤더 -->
  <g transform="translate(24,1845)">
    <rect width="752" height="56" rx="10" fill="#0f172a"/>
    <text x="20" y="37" class="h1" fill="#ffffff">🔍 ZOOM · Step 2 페르소나</text>
  </g>

  <!-- 아바타형 -->
  <g transform="translate(24,1925)">
    <rect width="752" height="270" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="3"/>
    <text x="16" y="38" class="h1">아바타형</text>
    <text x="16" y="65" class="h3">— 나를 대신하는 코코봇 —</text>
    <text x="16" y="90" class="body">"내 챗봇이 나 대신 타인의 질문에 응대"</text>
    <text x="16" y="112" class="sub">isPublic = true · 호칭 기본 "고객님"</text>

    <g transform="translate(16,128)">
      <rect width="720" height="42" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
      <text x="12" y="28" class="lead">▶ 빠른 시작 템플릿 (선택사항, 7개)</text>
    </g>

    <g transform="translate(16,188)">
      <g transform="translate(0,0)"><rect width="232" height="32" rx="6" fill="#ffffff" stroke="#cbd5e1"/><text x="116" y="22" class="pill" text-anchor="middle">🏢 기업경영자</text></g>
      <g transform="translate(244,0)"><rect width="232" height="32" rx="6" fill="#ffffff" stroke="#cbd5e1"/><text x="116" y="22" class="pill" text-anchor="middle">🍱 소상공인</text></g>
      <g transform="translate(488,0)"><rect width="232" height="32" rx="6" fill="#ffffff" stroke="#cbd5e1"/><text x="116" y="22" class="pill" text-anchor="middle">⚖️ 전문직</text></g>
      <g transform="translate(0,40)"><rect width="232" height="32" rx="6" fill="#ffffff" stroke="#cbd5e1"/><text x="116" y="22" class="pill" text-anchor="middle">🎨 프리랜서</text></g>
      <g transform="translate(244,40)"><rect width="232" height="32" rx="6" fill="#ffffff" stroke="#cbd5e1"/><text x="116" y="22" class="pill" text-anchor="middle">🗳️ 공직자</text></g>
      <g transform="translate(488,40)"><rect width="232" height="32" rx="6" fill="#ffffff" stroke="#cbd5e1"/><text x="116" y="22" class="pill" text-anchor="middle">⚙️ 기타</text></g>
    </g>
  </g>

  <!-- 도우미형 -->
  <g transform="translate(24,2220)">
    <rect width="752" height="270" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="3"/>
    <text x="16" y="38" class="h1">도우미형</text>
    <text x="16" y="65" class="h3">— 나를 도와주는 코코봇 —</text>
    <text x="16" y="90" class="body">"내 챗봇이 나의 업무·생활을 도움"</text>
    <text x="16" y="112" class="sub">isPublic = false · 호칭 기본 "님"</text>

    <g transform="translate(16,128)">
      <rect width="720" height="42" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
      <text x="12" y="28" class="lead">▶ 빠른 시작 템플릿 (선택사항, 7개)</text>
    </g>

    <g transform="translate(16,188)">
      <g transform="translate(0,0)"><rect width="232" height="32" rx="6" fill="#ffffff" stroke="#cbd5e1"/><text x="116" y="22" class="pill" text-anchor="middle">💼 업무</text></g>
      <g transform="translate(244,0)"><rect width="232" height="32" rx="6" fill="#ffffff" stroke="#cbd5e1"/><text x="116" y="22" class="pill" text-anchor="middle">📚 학습</text></g>
      <g transform="translate(488,0)"><rect width="232" height="32" rx="6" fill="#ffffff" stroke="#cbd5e1"/><text x="116" y="22" class="pill" text-anchor="middle">🎨 창작</text></g>
      <g transform="translate(0,40)"><rect width="232" height="32" rx="6" fill="#ffffff" stroke="#cbd5e1"/><text x="116" y="22" class="pill" text-anchor="middle">💪 건강</text></g>
      <g transform="translate(244,40)"><rect width="232" height="32" rx="6" fill="#ffffff" stroke="#cbd5e1"/><text x="116" y="22" class="pill" text-anchor="middle">🏠 생활</text></g>
      <g transform="translate(488,40)"><rect width="232" height="32" rx="6" fill="#ffffff" stroke="#cbd5e1"/><text x="116" y="22" class="pill" text-anchor="middle">⚙️ 기타</text></g>
    </g>
  </g>

  <!-- 직접 입력 -->
  <g transform="translate(24,2515)">
    <rect width="752" height="56" rx="10" fill="#ffffff" stroke="#0f172a" stroke-width="2" stroke-dasharray="5 3"/>
    <text x="400" y="37" class="h2" text-anchor="middle">✏️ 직접 입력 (자유 분류)</text>
  </g>

  <!-- 마이페이지 -->
  <g transform="translate(24,2600)">
    <rect width="752" height="56" rx="10" fill="#0f172a"/>
    <text x="20" y="37" class="h1" fill="#ffffff">🔍 마이페이지 페르소나 추가</text>
  </g>
  <g transform="translate(24,2680)">
    <rect width="752" height="160" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="16" y="35" class="h2">한도: 아바타 5 + 도우미 5 = 10</text>
    <text x="16" y="70" class="body">• 위저드는 1개만 생성 (필수)</text>
    <text x="16" y="95" class="body">• 추가 페르소나는 마이페이지에서</text>
    <text x="16" y="120" class="body">• 각 페르소나 = 독립 URL · 독립 KB</text>
    <text x="16" y="145" class="body">• 도우미형은 isPublic=false (비공개)</text>
  </g>

  <!-- 인증 게이트 -->
  <g transform="translate(24,2870)">
    <rect width="752" height="56" rx="10" fill="#dc2626"/>
    <text x="20" y="37" class="h1" fill="#ffffff">🚪 인증 게이트</text>
  </g>
  <g transform="translate(24,2950)">
    <rect width="752" height="195" rx="12" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
    <text x="16" y="35" class="h3">게스트 → Step 5에서 차단</text>
    <text x="16" y="68" class="body">• Step 1~4 진행 OK (게스트)</text>
    <text x="16" y="92" class="body">• Step 5 진입 시 → 로그인 모달</text>
    <text x="16" y="116" class="body">• Supabase Auth (OAuth + Email)</text>
    <text x="16" y="140" class="body good">• 로그인 후 draft 복원 → Step 5 재개</text>
    <text x="16" y="164" class="body">• 게스트 데모 봇 = 별도 트랙</text>
    <text x="16" y="188" class="body">• Step 5 실패 시 draft 유지 + 재시도</text>
  </g>
</svg>
