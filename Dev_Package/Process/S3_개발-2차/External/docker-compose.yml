# @task S3E3
# unspeech TTS 마이크로서비스 — Docker Compose 정의
#
# AGPL 라이선스 격리:
#   unspeech는 AGPL-3.0 라이선스 오픈소스입니다.
#   AGPL 특성상 네트워크 서비스로 사용 시 소스코드 공개 의무가 발생합니다.
#   CoCoBot 메인 코드베이스와의 라이선스 오염을 방지하기 위해
#   Docker 컨테이너로 완전 격리하여 배포합니다.
#   MCW는 HTTP API 프록시(tts-proxy.js)를 통해서만 통신합니다.

version: '3.8'
services:
  unspeech:
    image: unspeech/unspeech:latest
    ports:
      - "8080:8080"
    environment:
      - UNSPEECH_MODEL=kokoro
    restart: unless-stopped
