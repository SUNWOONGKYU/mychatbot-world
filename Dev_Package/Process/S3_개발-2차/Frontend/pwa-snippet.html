<!--
  PWA 연동 스니펫 — index.html 삽입용
  =====================================================
  사용법:
    1. <head> 태그 안에 "HEAD 삽입 블록" 전체를 추가
    2. </body> 직전에 "BODY 하단 삽입 블록" 전체를 추가
  =====================================================
-->

<!-- ═══════════════════════════════════════════════════
     [HEAD 삽입 블록] — <head> 안에 추가
     위치 권장: <meta name="viewport"> 바로 아래
═══════════════════════════════════════════════════ -->

<!-- PWA Manifest -->
<link rel="manifest" href="/manifest.json">

<!-- iOS Safari PWA 지원 (standalone 홈 화면 추가) -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CoCoBot">
<link rel="apple-touch-icon" href="/icons/icon-192x192.png">

<!-- Android / Windows 타일 색상 -->
<meta name="theme-color" content="#4F46E5">
<meta name="msapplication-TileColor" content="#4F46E5">

<!-- 모바일 최적화 CSS (chat 페이지에서만 로드) -->
<link rel="stylesheet" href="/css/chat-mobile.css">


<!-- ═══════════════════════════════════════════════════
     [BODY 하단 삽입 블록] — </body> 직전에 추가
═══════════════════════════════════════════════════ -->

<script>
  // Service Worker 등록
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker
        .register('/sw.js', { scope: '/' })
        .then(function (registration) {
          console.log('[SW] 등록 성공:', registration.scope);

          // 새 버전 감지 시 사용자에게 안내
          registration.addEventListener('updatefound', function () {
            const newWorker = registration.installing;
            if (!newWorker) return;

            newWorker.addEventListener('statechange', function () {
              if (
                newWorker.state === 'installed' &&
                navigator.serviceWorker.controller
              ) {
                // 선택적: 업데이트 배너 표시 (구현은 chat.js에서 담당)
                if (typeof window.onSwUpdate === 'function') {
                  window.onSwUpdate();
                }
              }
            });
          });
        })
        .catch(function (error) {
          console.warn('[SW] 등록 실패:', error);
        });
    });
  }

  // iOS 키보드 팝업 시 채팅 입력창 가시성 유지
  // visual viewport API 지원 브라우저에서 동작
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', function () {
      const inputArea = document.querySelector('.chat-input-area');
      if (!inputArea) return;

      const viewportHeight = window.visualViewport.height;
      const windowHeight = window.innerHeight;
      const keyboardHeight = windowHeight - viewportHeight;

      if (keyboardHeight > 100) {
        // 키보드 노출: 입력 영역을 키보드 위로 고정
        inputArea.style.transform = 'translateY(-' + keyboardHeight + 'px)';
      } else {
        // 키보드 숨김: 원위치
        inputArea.style.transform = '';
      }
    });
  }
</script>
