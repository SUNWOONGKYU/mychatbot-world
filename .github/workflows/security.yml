name: Security Audit

on:
  schedule:
    # 매주 월요일 09:00 KST (00:00 UTC)
    - cron: '0 0 * * 1'
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

jobs:
  audit:
    name: pnpm audit (High/Critical)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install deps (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit (High+)
        run: pnpm audit --audit-level=high --json > audit-report.json || true

      - name: Evaluate audit result
        run: |
          HIGH=$(jq '[.advisories // {} | to_entries[] | select(.value.severity=="high")] | length' audit-report.json 2>/dev/null || echo 0)
          CRIT=$(jq '[.advisories // {} | to_entries[] | select(.value.severity=="critical")] | length' audit-report.json 2>/dev/null || echo 0)
          echo "High: $HIGH / Critical: $CRIT"
          if [ "$CRIT" -gt 0 ]; then
            echo "❌ Critical 취약점 ${CRIT}건 — 즉시 대응 필요"
            exit 1
          fi
          if [ "$HIGH" -gt 5 ]; then
            echo "⚠️  High 취약점 ${HIGH}건 (>5) — 리뷰 필요"
            exit 1
          fi

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: audit-report.json
          retention-days: 30
