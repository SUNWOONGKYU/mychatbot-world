version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "00:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"
    groups:
      next-ecosystem:
        patterns:
          - "next"
          - "@next/*"
          - "eslint-config-next"
      react-ecosystem:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      supabase:
        patterns:
          - "@supabase/*"
      testing:
        patterns:
          - "@playwright/*"
          - "vitest"
          - "@vitest/*"
    ignore:
      # 메이저 버전 수동 업그레이드 (프레임워크)
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"
